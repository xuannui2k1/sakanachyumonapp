}

function reloadShiire(){ shiireLoaded=false; shiireCurrentPrefix=null; initShiireTab(); }

// 入力途中（未保存）の行があるか
function hasUnsavedShiireInput(){ return Object.keys(shiireDirtyKeys).length>0; }
// 入力途中の値をすべてキューに確定保存する
function commitAllDirty(){
  Object.keys(shiireDirtyKeys).forEach(function(key){
    var mp=shiireKeyMap[key]; if(mp) doSSave(mp.fn,mp.idx,key);
  });
}
// ユーザー操作による再読込：入力途中があれば確認する（消失防止）
function reloadShiireConfirm(){
  if(hasUnsavedShiireInput()){
    if(!confirm('未保存の入力があります。\n再読み込みしてもよろしいですか？')) return;
    commitAllDirty(); // 「はい」でも値を保存してから再読込
  }
  reloadShiire();
}
// ブラウザの更新／閉じる／戻る時に、未送信があれば警告し送信を試みる（消失防止）
window.addEventListener('beforeunload', function(e){
  var hasUnsaved = hasUnsavedShiireInput();
  if(hasUnsaved){
    commitAllDirty();                      // localStorage は同期書き込み→次回起動で再送
  }
  // 仕入・管理者編集のどちらかに未送信が残っていれば離脱を引き止める
  var pendingShiire = (typeof pendingShiireKeys==='function') ? pendingShiireKeys().length : 0;
  var pendingAdmin  = (typeof pendingAdminKeys==='function')  ? pendingAdminKeys().length  : 0;
  if(hasUnsaved || pendingShiire>0 || pendingAdmin>0){
    // 最後にもう一度送信を試みる（非同期だが、キューはlocalStorageに残るので
    // 送れなくても次回起動時に自動再送される）
    try{ flushShiireQueue(); }catch(_){}
    try{ flushAdminQueue(); }catch(_){}
    e.preventDefault(); e.returnValue='';  // ブラウザ標準の離脱確認を表示
  }
});

// ★モバイル対策：beforeunload はiOS Safari等でアプリ切替・画面ロック時に
//   発火しないことが多い。visibilitychange（非表示になる瞬間）と pagehide で
//   入力途中の値を確実にlocalStorageへ確定保存する。これらは同期処理なので
//   ページが凍結される前に書き込みが完了する。送信は次回前面復帰時に行う。
function commitOnHide(){
  try{
    if(typeof hasUnsavedShiireInput==='function' && hasUnsavedShiireInput()){
      commitAllDirty(); // dirtyな全欄をlocalStorageへ即保存
    }
  }catch(_){}
}
document.addEventListener('visibilitychange', function(){
  if(document.visibilityState==='hidden') commitOnHide();
});
window.addEventListener('pagehide', commitOnHide);
// 前面に戻ったら送信を再開（オフライン中にためた分を流す）
document.addEventListener('visibilitychange', function(){
  if(document.visibilityState==='visible'){
    try{ flushShiireQueue(); }catch(_){}
    try{ flushAdminQueue(); }catch(_){}
  }
});

async function loadShiireData(){
  var panelId = isAdmin ? 'admin-shiire-panel' : 'panel-shiire';
  var panel = document.getElementById(panelId);
  if(panel) panel.innerHTML='<div style="text-align:center;padding:60px 20px;color:var(--gray)"><div style="font-size:32px;margin-bottom:12px">⏳</div><p style="font-size:13px">読み込み中...</p></div>';
  showLoading('仕入データを読み込み中...');
  try{
    var url=SHIIRE_GAS_URL+'?action=readAll&sheetId='+encodeURIComponent(SHIIRE_SHEET_ID)+'&sheetName='+encodeURIComponent(shiireSheet);
    var res=await fetch(url);
    if(!res.ok) throw new Error('HTTP '+res.status);
    var json=await res.json();
    if(json.error){
      if(panel) panel.innerHTML='<div style="text-align:center;padding:60px 20px;color:var(--red)"><div style="font-size:32px;margin-bottom:12px">⚠️</div><p style="font-size:13px">'+esc(json.error)+'</p><button onclick="reloadShiire()" style="margin-top:12px;padding:10px 20px;background:var(--navy);color:white;border:none;border-radius:10px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer">🔄 再試行</button></div>';
      hideLoading();return;
    }
    shiireData={};
    (json.rows||[]).forEach(function(r){if(!shiireData[r.name])shiireData[r.name]=[];shiireData[r.name].push(r);});
    // 送信待ちの入力を新しいデータに上書き反映（番号が消えないように）
    applyQueueOverlay();
    shiireLoaded=true;
    renderShiireList();
  }catch(e){
    if(panel) panel.innerHTML='<div style="text-align:center;padding:60px 20px;color:var(--red)"><div style="font-size:32px;margin-bottom:12px">⚠️</div><p style="font-size:13px">通信エラー: '+esc(e.message)+'</p><button onclick="reloadShiire()" style="margin-top:12px;padding:10px 20px;background:var(--navy);color:white;border:none;border-radius:10px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer">🔄 再試行</button></div>';
    showToast('通信エラー: '+e.message,'error');
  }
  hideLoading();
}

function switchAdminMainTab(tab) {
  document.getElementById('admin-main-tab-orders').classList.toggle('active', tab==='orders');
  document.getElementById('admin-main-tab-shiire').classList.toggle('active', tab==='shiire');
  document.getElementById('admin-orders-section').style.display = tab==='orders' ? 'flex' : 'none';
  document.getElementById('admin-shiire-section').style.display = tab==='shiire' ? 'flex' : 'none';
  document.getElementById('admin-shiire-section').style.flexDirection = 'column';
  adminCurrentTab = tab;
  if(tab==='orders'){
    // 注文確認は初回タップ時のみ読込（遅延読込）
    if(!adminOrdersLoaded) loadOrdersData();
  }
  if(tab==='shiire'){
    if(!shiireLoaded) initShiireTab();
    else renderShiireList();
  }
}

var adminCurrentTab = 'shiire';

var shiireCurrentPrefix = null; // null = 全て

// ── 画面チラつき防止 ─────────────────────────────────────────
// 入力中（数量/単価のinputにフォーカスがある）は再描画を行わない。
// 再描画はDOMを丸ごと作り直す（innerHTML）ためフォーカス・入力中の
// 文字が失われ、画面が一瞬ちらつく。入力中に再描画要求が来た場合は
// pendingに記録し、フォーカスが外れた瞬間にまとめて再描画する。
var shiireRenderPending = false;

function isEditingShiire(){
  var a = document.activeElement;
  if(!a || a.tagName !== 'INPUT' || !a.id) return false;
  return a.id.charAt(0)==='f' && a.id.charAt(1)==='_'
      || a.id.charAt(0)==='h' && a.id.charAt(1)==='_'
      || a.id.charAt(0)==='i' && a.id.charAt(1)==='_';
}

// 入力欄からフォーカスが外れたら、保留していた再描画を実行
document.addEventListener('focusout', function(e){
  var t = e.target;
  if(!t || t.tagName !== 'INPUT' || !t.id) return;
  var isShiireInput = (t.id.charAt(1)==='_') &&
    (t.id.charAt(0)==='f' || t.id.charAt(0)==='h' || t.id.charAt(0)==='i');
  if(!isShiireInput) return;
  // フォーカスが別の入力欄へ移った場合は再描画しない（連続入力を妨げない）
  setTimeout(function(){
    if(isEditingShiire()) return;          // まだ別のinputを編集中
    if(shiireRenderPending){
      shiireRenderPending = false;
      renderShiireList();
    }
  }, 0);
});

function renderShiireList(){
  // 入力中はDOMを作り直さない（チラつき・フォーカス喪失を防止）。
  // 後でフォーカスが外れたタイミングで再描画する。
  if(isEditingShiire()){ shiireRenderPending = true; return; }

  var panelId = isAdmin ? 'admin-shiire-panel' : 'panel-shiire';
  var el = document.getElementById(panelId);
  if(!el) return;

  // Build prefix list from data
  var allNames = Object.keys(shiireData);
  var prefixSet = {};
  allNames.forEach(function(n){
    var pfx = n.substring(0,2); // e.g. '丸）'
    if(pfx.indexOf('）')!==-1) prefixSet[pfx]=true;
  });
  var prefixes = Object.keys(CODE_TO_PREFIX).map(function(c){return CODE_TO_PREFIX[c];})
    .filter(function(p){return prefixSet[p];});

  // Tab bar (admin only or partner with multiple groups)
  var showTabs = isAdmin && prefixes.length > 1;
  var tabBarHtml = '';
  if(showTabs){
    if(!shiireCurrentPrefix) shiireCurrentPrefix = prefixes[0];
    tabBarHtml = '<div style="display:flex;overflow-x:auto;gap:4px;padding:0 0 12px;scrollbar-width:none">'+
      prefixes.map(function(p){
        var lbl = Object.keys(CODE_TO_PREFIX).reduce(function(acc,c){
          return CODE_TO_PREFIX[c]===p ? CODE_LABELS[Number(c)]||p : acc;
        },'');
        var active = shiireCurrentPrefix===p;
        return '<button onclick="selectShiirePrefix(\''+p+'\')" style="flex-shrink:0;padding:7px 16px;border-radius:20px;border:1.5px solid '+(active?'var(--navy)':'var(--border)')+';background:'+(active?'var(--navy)':'white')+';color:'+(active?'white':'var(--gray)')+';font-size:13px;font-weight:700;font-family:inherit;cursor:pointer">'+esc(lbl)+'</button>';
      }).join('')+
      '</div>';
  } else {
    shiireCurrentPrefix = isAdmin ? null : (CODE_TO_PREFIX[Number(loginCode)]||null);
  }

  var prefix = shiireCurrentPrefix;
  var hdr='<div style="background:white;border-radius:11px;padding:11px 14px;display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;border:1px solid var(--border);box-shadow:var(--shadow-sm)">'+
    '<div><div style="font-size:13px;font-weight:700;color:var(--navy)">'+esc(shiireSheet)+'</div>'+
    '<div style="font-size:11px;color:var(--gray)">本日の仕入入力</div></div>'+
    '<button onclick="reloadShiireConfirm()" style="font-size:12px;color:var(--navy);background:#eef3fb;border:1px solid #c5d8f0;border-radius:8px;padding:7px 12px;font-family:inherit;font-weight:700;cursor:pointer">🔄 再読込</button>'+
  '</div>'+
  '<div id="shiire-queue-bar" style="display:none;position:fixed;left:50%;top:10px;transform:translateX(-50%);max-width:92%;justify-content:center;align-items:center;gap:6px;background:#fffbeb;border:1px solid var(--amber-border);border-radius:20px;padding:6px 12px;box-shadow:0 4px 16px rgba(15,39,68,0.2);z-index:900;white-space:nowrap"></div>';
  var names=Object.keys(shiireData).filter(function(n){return !prefix||n.startsWith(prefix);}).sort(function(a,b){
    var kwa=null,kwb=null;
    SHIIRE_GROUPED.forEach(function(kw){if(a.indexOf(kw)!==-1&&!kwa)kwa=kw;if(b.indexOf(kw)!==-1&&!kwb)kwb=kw;});
    var pa=getPriority(kwa||a),pb=getPriority(kwb||b);
    if(pa!==pb)return pa-pb;
    return (kwa||a).localeCompare(kwb||b,'ja');
  });
  if(names.length===0){
    var debugMsg = prefix
      ? 'プレフィックス「'+esc(prefix)+'」のデータが見つかりません<br><small style="color:#aaa">シートに「'+esc(prefix)+'」で始まる行があるか確認してください</small>'
      : 'データがありません';
    el.innerHTML=hdr+tabBarHtml+'<div class="empty"><div class="eicon">📋</div><p>'+debugMsg+'</p></div>';
    return;
  }
  var rendered={},cards=[];
  names.forEach(function(fn){
    var gkw=null;
    SHIIRE_GROUPED.forEach(function(kw){if(fn.indexOf(kw)!==-1&&!gkw)gkw=kw;});
    if(gkw){
      var gk=(prefix||'all')+'_'+gkw;
      if(!rendered[gk]){rendered[gk]=true;var vs=names.filter(function(n){return n.indexOf(gkw)!==-1;});cards.push(buildGrpCard(gkw,vs));}
    }else{
      if(!rendered[fn]){rendered[fn]=true;cards.push(buildFishCard(fn));}
    }
  });
  el.innerHTML=hdr+tabBarHtml+cards.join('');
  updateQueueBadge();
  flushShiireQueue();
  setTimeout(function(){
    el.querySelectorAll('[data-autodefault="1"]').forEach(function(inp){
      var fn2=inp.getAttribute('data-fn');
      var idx2=parseInt(inp.getAttribute('data-idx'));
      var key2=inp.id.replace('f_','');
      schSave(fn2,idx2,key2);
    });
  },100);
}

function buildFishCard(fn){
  var stores=shiireData[fn]||[];
  var filled=stores.filter(function(s){return s.qty!==''&&s.qty!==null;}).length;
  var cid='fc_'+skStr(fn);
  var rows=stores.map(function(s,i){return buildStoreRow(fn,i,s,false);}).join('');
  return '<div class="s-fish-card'+(filled>0?' has-filled':'')+'" id="'+cid+'">'+
    '<div class="s-fish-header" onclick="toggleFC(\''+cid+'\')">'+
    '<div><div class="s-fish-name">'+esc(fn)+'</div><div class="s-fish-summary">'+stores.length+'店舗 · '+filled+'件入力済</div></div>'+
    '<span class="s-fish-arrow" id="arr_'+cid+'">▾</span></div>'+
    '<div class="s-fish-body" id="body_'+cid+'"><div class="s-store-list">'+rows+'</div></div></div>';
}

function buildGrpCard(kw,variants){
  var all=[];
  variants.forEach(function(vn){(shiireData[vn]||[]).forEach(function(s,i){all.push({s:s,fn:vn,idx:i});});});
  all.sort(function(a,b){return Number(a.s.code)-Number(b.s.code);});
  var filled=all.filter(function(si){return si.s.qty!==''&&si.s.qty!==null;}).length;
  var cid='fc_grp_'+skStr(kw);
  var rows=all.map(function(si){return buildStoreRow(si.fn,si.idx,si.s,true);}).join('');
  return '<div class="s-fish-card'+(filled>0?' has-filled':'')+'" id="'+cid+'">'+
    '<div class="s-fish-header" onclick="toggleFC(\''+cid+'\')">'+
    '<div><div class="s-fish-name">'+esc(kw)+' <span style="font-size:12px;color:#94a3b8;font-weight:400">('+variants.length+'種)</span></div>'+
    '<div class="s-fish-summary">'+all.length+'店舗 · '+filled+'件入力済</div></div>'+
    '<span class="s-fish-arrow" id="arr_'+cid+'">▾</span></div>'+
    '<div class="s-fish-body" id="body_'+cid+'"><div class="s-store-list">'+rows+'</div></div></div>';
}

function buildStoreRow(fn,idx,s,showVariant){
  var key=sKey(fn,idx);
  shiireKeyMap[key]={fn:fn,idx:idx}; // 行特定用
  // この行が「要確認(dead)」状態なら、メッセージ＋再送信ボタンを初期表示する
  var _qi=getShiireQueue()[qKeyOf(shiireSheet,s.row)];
  var _dead=_qi&&_qi.dead;
  var msgHtml=_dead?(esc('❌ 保存できません: '+(_qi.err||'数値を確認してください'))+retryBtnHtml(s.row,key)):'';
  var msgCls=_dead?'s-save-msg err':'s-save-msg';
  var filled=s.qty!==''&&s.qty!==null&&s.qty!==undefined;
  var sname=NAME_MAP[Number(s.code)]||s.store;
  var vtag=showVariant?'<span style="font-size:11px;color:#94a3b8;margin-left:4px">'+esc(s.name)+'</span>':'';
  return '<div class="s-store-row'+(filled?' filled':'')+'" id="row_'+key+'">'+
    '<div class="s-store-header" onclick="toggleSR(\''+key+'\')">'+
    '<div><div class="s-store-name-text">'+esc(s.code)+' '+esc(sname)+vtag+'</div>'+
    (s.unit?'<div style="font-size:11px;color:#94a3b8">'+esc(s.unit)+'</div>':'')+
    '</div><span id="badge_'+key+'" class="s-store-badge '+(filled?'badge-filled':'badge-empty')+'">'+(filled?'✓ 入力済':'未入力')+'</span></div>'+
    '<div class="s-input-area open" id="area_'+key+'">'+
    '<div class="s-input-grid" style="grid-template-columns:1fr 1fr 1fr">'+
    '<div class="s-field"><label>数量 (F列)</label>'+
    (function(){var isDefault=(s.qty===''||s.qty===null||s.qty===undefined)&&fn.startsWith(CODE_TO_PREFIX[100]);var val=s.qty!==''&&s.qty!=null?s.qty:(isDefault?'5':'');return '<input type="number" id="f_'+key+'" value="'+esc(val)+'" inputmode="decimal"'+(isDefault?' data-autodefault="1" data-fn="'+esc(fn)+'" data-idx="'+idx+'"':'')+' oninput="schDirty(\''+key+'\')" onchange="schSave(\''+fn+'\','+idx+',\''+key+'\')">';})()+'</div>'+
    '<div class="s-field"><label>単価 (H列)</label>'+
    '<input type="number" id="h_'+key+'" value="'+esc(s.price||'')+'" inputmode="decimal" placeholder="同じ価格はここへ" oninput="schDirty(\''+key+'\')" onchange="schSave(\''+fn+'\','+idx+',\''+key+'\')">'+
    '<div style="font-size:10px;color:#aaa;margin-top:3px">全商品同価格の場合</div></div>'+
    '<div class="s-field"><label>仕入単価 (I列)</label>'+
    '<input type="number" id="i_'+key+'" value="'+esc(s.shiirePrice||'')+'" inputmode="decimal" placeholder="個別価格はここへ" oninput="schDirty(\''+key+'\')" onchange="schSave(\''+fn+'\','+idx+',\''+key+'\')">'+
    '<div style="font-size:10px;color:#aaa;margin-top:3px">この商品のみ異なる場合</div></div>'+
    '</div>'+
    '<div class="'+msgCls+'" id="msg_'+key+'">'+msgHtml+'</div></div></div>';
}

function toggleFC(cid){
  var body=document.getElementById('body_'+cid);
  var arr=document.getElementById('arr_'+cid);
  var open=body.classList.toggle('open');
  arr.classList.toggle('open',open);
  if(open){
    body.querySelectorAll('.s-input-area').forEach(function(a){a.classList.add('open');});
  }
}

function toggleSR(key){
  document.getElementById('area_'+key).classList.toggle('open');
}

// ══════════════════════════════════════════════════════════════
// 仕入入力 オフラインキュー（電波が弱い／圏外でも入力を保持し、
// 回線が安定したらGoogle Sheetへ書き込めるまで自動リトライ）
// ══════════════════════════════════════════════════════════════
var SHIIRE_QUEUE_KEY = 'shiire_queue_v1';
var shiireSeq = 0; // 各入力に一意のver（送信中に上書きされたか判定するため）
var shiireDirtyKeys = {}; // 入力途中（まだ保存していない）行 key の集合 — 再読込警告用
var shiireKeyMap = {};    // key -> {fn, idx} （blur/再読込時に行を特定するため）

function getShiireQueue(){
  try{ return JSON.parse(store('get',SHIIRE_QUEUE_KEY)||'{}'); }catch(e){ return {}; }
}

// localStorage への書き込みが成功したか返す。失敗（容量不足・無効化など）なら
// 画面下に消えない赤いバーで警告する（黙って失敗＝値が保存も送信もされないのを防ぐ）
var shiireStorageBroken=false;
function setShiireQueue(q){
  var s; try{ s=JSON.stringify(q); }catch(e){ s=null; }
  if(s===null){ shiireStorageBroken=true; showStorageError(); return false; }
  try{
    localStorage.setItem(SHIIRE_QUEUE_KEY, s);
    if(shiireStorageBroken){ shiireStorageBroken=false; hideStorageError(); } // 復旧したら消す
    return true;
  }catch(e){
    shiireStorageBroken=true; showStorageError(); return false;
  }
}
function showStorageError(){
  var el=document.getElementById('storage-error-bar');
  if(!el){
    el=document.createElement('div');
    el.id='storage-error-bar';
    el.style.cssText='position:fixed;left:0;right:0;bottom:0;z-index:9999;background:#7f1d1d;color:#fff;padding:12px 16px;font-size:13px;font-weight:700;font-family:inherit;line-height:1.5;box-shadow:0 -4px 20px rgba(0,0,0,0.35);text-align:center';
    document.body.appendChild(el);
  }
  el.innerHTML='⚠️ 端末の保存容量が不足し、入力を保存できませんでした'+
    '<br><span style="font-weight:400;font-size:12px">この値はメモして、ブラウザのデータ（履歴/キャッシュ）を整理してから入力し直してください</span>';
  el.style.display='block';
}
function hideStorageError(){ var el=document.getElementById('storage-error-bar'); if(el) el.style.display='none'; }

// 現在のシートで送信待ちの値を shiireData に反映（再読込時に未送信の入力が消えないように）
function applyQueueOverlay(){
  var q=getShiireQueue();
  Object.keys(q).forEach(function(qk){
    var item=q[qk];
    if(!item||item.sheetName!==shiireSheet) return;
    var arr=shiireData[item.fn];
    var s=arr&&arr[item.idx];
    // 行番号で照合（fn/idxがずれても row が一致すれば反映）
    if(!s||s.row!==item.row){
      s=null;
      Object.keys(shiireData).forEach(function(nm){
        shiireData[nm].forEach(function(rr){ if(rr.row===item.row) s=rr; });
      });
    }
    if(s){
      if(item.f!=null) s.qty=item.f; 
      if(item.h!=null) s.price=item.h;
      if(item.i!=null) s.shiirePrice=item.i;
    }
  });
}

function qKeyOf(sheetName,row){ return sheetName+'|'+row; }

// 保留中の件数バッジ表示
function updateQueueBadge(){
  var q=getShiireQueue();
  var ks=Object.keys(q);
  var dead=0, pending=0;
  ks.forEach(function(k){ if(q[k]&&q[k].dead) dead++; else pending++; });
  var el=document.getElementById('shiire-queue-bar');
  if(!el) return;
  if(pending>0 || dead>0){
    el.style.display='flex';
    var online=navigator.onLine;
    var html='';
    if(pending>0){
      html+='<span style="font-size:11px;font-weight:700;color:#92400e">⏳ 送信待ち '+pending+'件</span>'+
            '<span style="font-size:9px;color:#b45309">'+(online?'送信中…':'📴 オフライン')+'</span>';
    }
    if(dead>0){
      // 恒久エラー（要確認）— 赤系で目立たせる
      html+='<span style="font-size:11px;font-weight:700;color:#b91c1c'+(pending>0?';margin-left:auto':'')+'">❌ 要確認 '+dead+'件</span>';
    }
    el.innerHTML=html;
  }else{
    el.style.display='none';
    el.innerHTML='';
  }
}

// 入力中 — 変化を「未保存」として記録しつつ、400msのデバウンスで
// localStorageへ自動保存する（送信はしない）。これにより、ほかの欄を
// 押さずにアプリ切替・スリープ・タブを閉じても入力値が消えない。
function schDirty(key){
  clearTimeout(shiireTimers[key]);
  // 保存済みの値と比較し、実際に変化した時だけ「未保存」として記録する
  // （同じ値を入力し直しただけ＝case#3 は未保存扱いにしない＝誤警告を防ぐ）
  var mp=shiireKeyMap[key];
  var s=mp&&shiireData[mp.fn]&&shiireData[mp.fn][mp.idx];
  var fEl=document.getElementById('f_'+key);
  var hEl=document.getElementById('h_'+key);
  var iEl=document.getElementById('i_'+key);
  var changed=true;
  if(s&&fEl&&hEl&&iEl){
    changed=(String(fEl.value||'')!==String(s.qty==null?'':s.qty))||
            (String(hEl.value||'')!==String(s.price==null?'':s.price))||
            (String(iEl.value||'')!==String(s.shiirePrice==null?'':s.shiirePrice));
  }
  if(changed) shiireDirtyKeys[key]=1; else delete shiireDirtyKeys[key];
  var m=document.getElementById('msg_'+key);
  if(m){m.textContent='✏️ 入力中…';m.className='s-save-msg';}

  // 変化があれば400ms後に自動保存（送信はしない＝速度に影響させない）
  if(changed && mp){
    shiireTimers[key]=setTimeout(function(){
      // まだ同じ欄を編集中でも、値だけは安全に保存しておく
      doSSave(mp.fn,mp.idx,key,false);
    },400);
  }
}

function schSave(fn,idx,key){
  clearTimeout(shiireTimers[key]);
  // onchange は値が確定したタイミングで発火するので即保存＋即送信
  doSSave(fn,idx,key,true);
}

// doSend=true  : 保存してすぐ送信（onchange・確定時）
// doSend=false : 保存だけ（oninputのデバウンス。送信は次のonchange/自動リトライに任せる）
//   → 入力途中でも値がlocalStorageに残るので、画面遷移・アプリ切替・端末スリープで
//     beforeunloadが発火しなくても消えない。送信はしないので入力の速度に影響しない。
function doSSave(fn,idx,key,doSend){
  if(doSend===undefined) doSend=true;
  clearTimeout(shiireTimers[key]);
  var s=shiireData[fn]&&shiireData[fn][idx];
  if(!s)return;
  var fEl=document.getElementById('f_'+key);
  var hEl=document.getElementById('h_'+key);
  var iEl=document.getElementById('i_'+key);
  if(!fEl||!hEl||!iEl)return;
  var fv=fEl.value||'';
  var hv=hEl.value||'';
  var iv=iEl.value||'';

  // ★ユーザーが実際に触った列だけ送る。触っていない列はキーごと省略し、
  //   GAS側で「キー無し=そのセルは触らない」とする。
  //   こうしないと、H列だけ入力した時に i:'' が送られ、I列の数式が消える。
  var origF=(fEl.defaultValue||''), origH=(hEl.defaultValue||''), origI=(iEl.defaultValue||'');

  // 1) ローカル即時反映（画面が再描画・リロードされても消えない）
  s.qty=fv; s.price=hv; s.shiirePrice=iv;

  // 2) キューに保存（永続化）— 同じ行は最新値で上書き
  // ★空欄は null ではなく '' を送る。GAS側で「''=セルをクリア」「キー無し=触らない」
  //   と区別するため。3列(F/H/I)はそれぞれ独立してクリアできる。
  var q=getShiireQueue();
  var existing=q[qKeyOf(shiireSheet,s.row)]||{};
  var payload={
    sheetName:shiireSheet, row:s.row,
    fn:fn, idx:idx, key:key, ts:Date.now(),
    ver:(Date.now()+'_'+(++shiireSeq)) // 上書き検出用の一意トークン
  };
  // 既にキューにある変更（前回の保存分）は維持しつつ、今回変わった列を加える
  if('f' in existing) payload.f=existing.f;
  if('h' in existing) payload.h=existing.h;
  if('i' in existing) payload.i=existing.i;
  if(fv!==origF) payload.f=fv;
  if(hv!==origH) payload.h=hv;
  if(iv!==origI) payload.i=iv;
  q[qKeyOf(shiireSheet,s.row)]=payload;
  var qSaved=setShiireQueue(q);
  // 保存できた時だけ「未保存」を解除。失敗時は未保存のままにして再読込時に警告する
  if(qSaved) delete shiireDirtyKeys[key]; else shiireDirtyKeys[key]=1;

  // 3) バッジ等のUI更新
  var filled=(fv!==''&&fv!=null);
  var b=document.getElementById('badge_'+key);
  if(b){b.textContent=filled?'✓ 入力済':'未入力';b.className='s-store-badge '+(filled?'badge-filled':'badge-empty');}
  var r=document.getElementById('row_'+key);if(r)r.classList.toggle('filled',filled);
  var m=document.getElementById('msg_'+key);
  if(m){
    if(!qSaved){ m.textContent='❌ 保存できませんでした（容量不足）。値をメモして再入力してください'; m.className='s-save-msg err'; }
    else if(doSend){ m.textContent='⏳ 送信待ち'; m.className='s-save-msg'; }
    else { m.textContent='✏️ 入力中…（自動保存済み）'; m.className='s-save-msg'; } // 保存済み・未送信
  }

  updateQueueBadge();

  // 4) 送信を試みる（doSend=true かつ 保存成功時のみ）。
  //    oninput(doSend=false)では送信しない＝入力の速度に影響させない。
  if(qSaved && doSend) flushShiireQueue();
}

function retryBtnHtml(row,domKey){
  return ' <button onclick="retryShiire('+row+',\''+domKey+'\')" style="margin-left:8px;padding:3px 10px;background:var(--navy);color:#fff;border:none;border-radius:6px;font-size:11px;font-weight:700;font-family:inherit;cursor:pointer">🔄 再送信</button>';
}

// dead（要確認）になった行を、ユーザー操作で1回だけ再送信する
async function retryShiire(row,domKey){
  var qk=qKeyOf(shiireSheet,row);
  var q=getShiireQueue();
  var item=q[qk];
  var m=document.getElementById('msg_'+domKey);
  if(!item){ if(m){m.textContent='✓ 送信済み';m.className='s-save-msg ok';} updateQueueBadge(); return; }
  // dead を解除し、あと1回だけ試す（失敗すれば再び dead になり、原因が表示される）
  item.dead=false;
  item.tries=Math.max(0,SHIIRE_MAX_TRIES-1);
  setShiireQueue(q);
  if(m){m.textContent='⏳ 再送信中…';m.className='s-save-msg';}
  var r=await sendOneShiire(qk);
  // 成功(ok)・恒久エラー(dead) のメッセージは sendOneShiire 側で更新済み
  if(r==='net'&&m){ m.innerHTML='📴 通信できません（回線を確認）'+retryBtnHtml(row,domKey); m.className='s-save-msg err'; }
  updateQueueBadge();
}

// 1件分を送信。戻り値: 'ok'（成功・削除済）/ 'server'（サーバ応答不正）/ 'net'（通信失敗）/ 'dead'（恒久エラー・要確認）
var SHIIRE_MAX_TRIES=10; // サーバ応答不正がこの回数続いたら諦めて「要確認」にする
async function sendOneShiire(qk){
  var item=getShiireQueue()[qk];
  if(!item) return 'ok';
  // すでに恒久エラー扱いのものは送信しない（無限リトライ防止）
  if(item.dead) return 'dead';
  var sentVer=item.ver; // この送信が運んだ値のバージョン
  var ctrl=new AbortController();
  var to=setTimeout(function(){ctrl.abort();},20000);
  var res,json=null;
  try{
    try{
      res=await fetch(SHIIRE_GAS_URL,{
        method:'POST',
        body:JSON.stringify({action:'write',sheetId:SHIIRE_SHEET_ID,sheetName:item.sheetName,row:item.row,f:item.f,h:item.h,i:item.i}),
        headers:{'Content-Type':'text/plain'},
        signal:ctrl.signal
      });
    }finally{ clearTimeout(to); }
    if(!res.ok) throw new Error('HTTP '+res.status);
    var txt=await res.text();
    try{ json=JSON.parse(txt); }catch(pe){ json=null; }
    if(json&&json.success){
      var cur=getShiireQueue();
      // 送信中にユーザーが同じ欄を編集していた場合（ver が変わっている）、
      // 古い送信の成功で新しい値を消さない（＝V2の消失を防ぐ）
      if(cur[qk] && cur[qk].ver===sentVer){
        var wasClear=(cur[qk].f===''&&cur[qk].h===''&&cur[qk].i==='');
        delete cur[qk];
        setShiireQueue(cur);
        if(item.sheetName===shiireSheet){
          var m=document.getElementById('msg_'+item.key);
          if(m){m.textContent=wasClear?'🗑 削除しました':'✓ 保存しました';m.className='s-save-msg ok';}
        }
      }else{
        // より新しい入力が残っている → もう一周して新しい値を送る
        shiireFlushAgain=true;
      }
      return 'ok';
    }
    // ここに来た = success が false（サーバ側エラー/不正応答）
    var serverErr=(json&&(json.error||json.message))?String(json.error||json.message):'';
    var cur2=getShiireQueue();
    var it2=cur2[qk];
    // 送信中に新しい編集が入っていれば、この古い送信の失敗は無視して再送に任せる
    if(it2 && it2.ver!==sentVer){ shiireFlushAgain=true; return 'ok'; }
    if(it2){
      it2.tries=(it2.tries||0)+1;
      if(serverErr) it2.err=serverErr; // GASがエラー文を返したら保持（再送信時に表示）
      if(it2.tries>=SHIIRE_MAX_TRIES){
        // 諦める：恒久エラーとして印を付け、リトライ対象から外す
        it2.dead=true;
        setShiireQueue(cur2);
        if(item.sheetName===shiireSheet){
          var md=document.getElementById('msg_'+item.key);
          if(md){md.innerHTML=esc('❌ 保存できません: '+(it2.err||'数値を確認してください'))+retryBtnHtml(item.row,item.key);md.className='s-save-msg err';}
        }
        return 'dead';
      }
      setShiireQueue(cur2);
    }
    if(item.sheetName===shiireSheet){
      var m2=document.getElementById('msg_'+item.key);
      if(m2){m2.textContent='⚠️ サーバ応答が不正（再試行 '+((it2&&it2.tries)||1)+'/'+SHIIRE_MAX_TRIES+'）';m2.className='s-save-msg';}
    }
    return 'server';
  }catch(e){
    // 通信失敗・タイムアウト（圏外・電波弱）→ 残して後で自動リトライ（回数はカウントしない）
    if(item.sheetName===shiireSheet){
      var m3=document.getElementById('msg_'+item.key);
      if(m3){m3.textContent='📴 未送信（回線待ち・自動で再試行）';m3.className='s-save-msg';}
    }
    return 'net';
  }
}

var shiireFlushing=false;
var shiireFlushAgain=false; // 送信中に新しい入力が来たら、終わった後にもう一度回す
var SHIIRE_BATCH=4;         // 同時送信数（速度向上）
// dead（恒久エラー）を除いた、まだ送るべきキー
function pendingShiireKeys(){
  var q=getShiireQueue();
  return Object.keys(q).filter(function(k){ return q[k] && !q[k].dead; });
}
async function flushShiireQueue(){
  if(shiireFlushing){ shiireFlushAgain=true; return; } // 実行中なら再実行を予約
  if(!navigator.onLine){ updateQueueBadge(); return; }
  if(pendingShiireKeys().length===0){ updateQueueBadge(); return; }
  shiireFlushing=true;
  try{
    do{
      shiireFlushAgain=false;
      var netFail=false;
      // 毎ループでキューを取り直す（送信中に増えた分も拾う・deadは除く）
      var keys=pendingShiireKeys();
      for(var i=0; i<keys.length; i+=SHIIRE_BATCH){
        if(!navigator.onLine){ netFail=true; break; }
        var batch=keys.slice(i,i+SHIIRE_BATCH);
        // バッチ内は並列送信。1件失敗しても他は止めない（break しない）
        var results=await Promise.all(batch.map(function(qk){ return sendOneShiire(qk); }));
        if(results.indexOf('net')!==-1){ netFail=true; break; } // 通信失敗は次回リトライ
      }
      if(netFail) break; // 圏外などはここで中断（残りはキューに残る）
      // 通信は成功。送信中に新規入力が来ていれば、もう一周して残りを送る
    }while(shiireFlushAgain && navigator.onLine);
  }finally{
    shiireFlushing=false;
    updateQueueBadge();
    // 取りこぼし保険：dead以外がまだ残っていてオンラインなら、少し後に再送
    if(navigator.onLine && pendingShiireKeys().length>0){
      setTimeout(function(){ flushShiireQueue(); }, 1200);
    }
  }
}

// 自動リトライ：15秒ごと＋オンライン復帰時
setInterval(function(){ flushShiireQueue(); }, 15000);
window.addEventListener('online', function(){ showToast('回線が復帰しました。送信を再開します','success'); flushShiireQueue(); });
window.addEventListener('offline', function(){ updateQueueBadge(); });

// ══════════════════════════════════════════════════════════════
// 管理者編集 オフラインキュー（setEdit / markDeleted / unmarkDeleted /
// setGroupComment を POST で送る。電波が弱い／圏外でも編集を保持し、
// 回線が安定したらGASへ書き込めるまで自動リトライ。仕入入力と同じ思想）
//
// ・各操作を1件ずつキューに積む（localStorage 永続化）
// ・ver（一意トークン）で「送信中に上書きされたか」を判定し、古い送信の
//   成功で新しい編集を消さない
// ・15秒ごと＋オンライン復帰時に自動フラッシュ
// ・成功するまで「⏳ 送信待ち」、サーバ恒久エラーは MAX_TRIES で諦めて表示
// ══════════════════════════════════════════════════════════════
var ADMIN_QUEUE_KEY = 'admin_queue_v1';
var adminSeq = 0;
var ADMIN_MAX_TRIES = 10;
var adminFlushing = false;
var adminFlushAgain = false;
var ADMIN_BATCH = 4;

function getAdminQueue(){
  try{ return JSON.parse(store('get',ADMIN_QUEUE_KEY)||'{}'); }catch(e){ return {}; }
}
var adminStorageBroken=false;
function setAdminQueue(q){
  var s; try{ s=JSON.stringify(q); }catch(e){ s=null; }
  if(s===null){ adminStorageBroken=true; showStorageError(); return false; }
  try{
    localStorage.setItem(ADMIN_QUEUE_KEY, s);
    if(adminStorageBroken){ adminStorageBroken=false; hideStorageError(); }
    return true;
  }catch(e){
    adminStorageBroken=true; showStorageError(); return false;
  }
}

// 操作をキューに積む。logicalKey が同じものは最新で上書き（無駄な多重送信を防ぐ）。
//   action: 'setEdit' | 'markDeleted' | 'unmarkDeleted' | 'setGroupComment'
//   payload: GASに渡すフィールド（date は送信時に補完）
//   logicalKey: 同じ対象への操作をまとめる識別子
function enqueueAdmin(action, payload, logicalKey){
  var q=getAdminQueue();
  q[logicalKey]={
    action:action, payload:payload, logicalKey:logicalKey,
    ts:Date.now(), tries:0, dead:false,
    ver:(Date.now()+'_'+(++adminSeq))
  };
  var ok=setAdminQueue(q);
  updateAdminQueueBadge();
  if(ok) flushAdminQueue();
  return ok;
}

function pendingAdminKeys(){
  var q=getAdminQueue();
  return Object.keys(q).filter(function(k){ return q[k] && !q[k].dead; });
}

// 送信待ち／要確認の件数を画面上部のバッジに表示
function updateAdminQueueBadge(){
  var q=getAdminQueue();
  var ks=Object.keys(q);
  var dead=0, pending=0;
  ks.forEach(function(k){ if(q[k]&&q[k].dead) dead++; else pending++; });
  var el=document.getElementById('admin-queue-bar');
  if(!el){
    if(pending>0||dead>0){
      el=document.createElement('div');
      el.id='admin-queue-bar';
      el.style.cssText='display:flex;position:fixed;left:50%;top:10px;transform:translateX(-50%);max-width:92%;justify-content:center;align-items:center;gap:6px;background:#fffbeb;border:1px solid var(--amber-border);border-radius:20px;padding:6px 12px;box-shadow:0 4px 16px rgba(15,39,68,0.2);z-index:901;white-space:nowrap';
      document.body.appendChild(el);
    }else{
      return;
    }
  }
  if(pending>0||dead>0){
    el.style.display='flex';
    var online=navigator.onLine;
    var html='';
    if(pending>0){
      html+='<span style="font-size:11px;font-weight:700;color:#92400e">⏳ 同期待ち '+pending+'件</span>'+
            '<span style="font-size:9px;color:#b45309">'+(online?'送信中…':'📴 オフライン')+'</span>';
    }
    if(dead>0){
      html+='<span style="font-size:11px;font-weight:700;color:#b91c1c'+(pending>0?';margin-left:auto':'')+'">❌ 要確認 '+dead+'件</span>';
    }
    el.innerHTML=html;
  }else{
    el.style.display='none';
    el.innerHTML='';
  }
}

// 1件送信。戻り値 'ok'/'server'/'net'/'dead'
async function sendOneAdmin(qk){
  var item=getAdminQueue()[qk];
  if(!item) return 'ok';
  if(item.dead) return 'dead';
  var sentVer=item.ver;
  var ds=todayKey().replace('snap_','');
  var body={action:item.action, date:ds};
  var pl=item.payload||{};
  for(var pk in pl){ if(pl.hasOwnProperty(pk)) body[pk]=pl[pk]; }
  var ctrl=new AbortController();
  var to=setTimeout(function(){ctrl.abort();},20000);
  var res,json=null;
  try{
    try{
      res=await fetch(gasUrl,{
        method:'POST',
        body:JSON.stringify(body),
        headers:{'Content-Type':'text/plain'}, // GASのCORSプリフライト回避
        signal:ctrl.signal
      });
    }finally{ clearTimeout(to); }
    if(!res.ok) throw new Error('HTTP '+res.status);
    var txt=await res.text();
    try{ json=JSON.parse(txt); }catch(pe){ json=null; }
    if(json&&json.success){
      var cur=getAdminQueue();
      if(cur[qk] && cur[qk].ver===sentVer){
        delete cur[qk];
        setAdminQueue(cur);
      }else{
        adminFlushAgain=true; // 送信中に新しい編集 → もう一周
      }
      return 'ok';
    }
    // success が false
    var cur2=getAdminQueue();
    var it2=cur2[qk];
    if(it2 && it2.ver!==sentVer){ adminFlushAgain=true; return 'ok'; }
    if(it2){
      it2.tries=(it2.tries||0)+1;
      if(json&&(json.error||json.message)) it2.err=String(json.error||json.message);
      if(it2.tries>=ADMIN_MAX_TRIES){
        it2.dead=true;
        setAdminQueue(cur2);
        return 'dead';
      }
      setAdminQueue(cur2);
    }
    return 'server';
  }catch(e){
    // 通信失敗・タイムアウト → 残して自動リトライ（回数はカウントしない）
    return 'net';
  }
}

async function flushAdminQueue(){
  if(adminFlushing){ adminFlushAgain=true; return; }
  if(!navigator.onLine){ updateAdminQueueBadge(); return; }
  if(pendingAdminKeys().length===0){ updateAdminQueueBadge(); return; }
  adminFlushing=true;
  try{
    do{
      adminFlushAgain=false;
      var netFail=false;
      var keys=pendingAdminKeys();
      for(var i=0;i<keys.length;i+=ADMIN_BATCH){
        if(!navigator.onLine){ netFail=true; break; }
        var batch=keys.slice(i,i+ADMIN_BATCH);
        var results=await Promise.all(batch.map(function(qk){ return sendOneAdmin(qk); }));
        if(results.indexOf('net')!==-1){ netFail=true; break; }
      }
      if(netFail) break;
    }while(adminFlushAgain && navigator.onLine);
  }finally{
    adminFlushing=false;
    updateAdminQueueBadge();
    if(navigator.onLine && pendingAdminKeys().length>0){
      setTimeout(function(){ flushAdminQueue(); }, 1500);
    }
  }
}

// 自動リトライ：15秒ごと＋オンライン復帰時（仕入と共通の online/offline ハンドラに相乗り）
setInterval(function(){ flushAdminQueue(); }, 15000);
window.addEventListener('online', function(){ flushAdminQueue(); });

// アプリが再び前面に来たら（タブ復帰）すぐ更新確認する（1分待たない）
document.addEventListener('visibilitychange', function(){
  if (!document.hidden) {
    try { checkForUpdates(); } catch(_){}
  }
});

// ══════════════════════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════════════════════
function orderKey(i, o) {
  return todayKey() + '_' + loginCode + '_' + i + '_' + o.custCode + '_' + o.itemCode;
}

function pad(n){ return String(n).padStart(2,'0'); }

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function store(op, key, val) {
  try {
    if (op==='get') return localStorage.getItem(key);
    if (op==='set') { localStorage.setItem(key, val); return; }
    if (op==='del') { localStorage.removeItem(key); return; }
  } catch(e){ return null; }
}

function showLoading(t){ document.getElementById('loading-text').textContent=t||'Loading...'; document.getElementById('loading').classList.add('show'); }
function hideLoading(){  document.getElementById('loading').classList.remove('show'); }

function showToast(msg, type) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className   = 'show' + (type ? ' '+type : '');
  clearTimeout(t._t);
  t._t = setTimeout(function(){ t.className=''; }, 2800);
}
