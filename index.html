<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>注文確認システム</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --navy:#0f2744;--navy2:#1a3a5c;--navy3:#1e4d7b;
  --sky:#0ea5e9;--sky-light:#e0f2fe;
  --green:#16a34a;--green-light:#dcfce7;
  --amber:#f59e0b;--amber-light:#fffbeb;--amber-border:#fde68a;
  --red:#dc2626;--red-light:#fee2e2;
  --gray:#64748b;--gray-light:#f1f5f9;
  --border:#e2e8f0;--white:#ffffff;
  --shadow:0 4px 24px rgba(15,39,68,0.10);
  --shadow-sm:0 2px 8px rgba(15,39,68,0.07);
}
body{font-family:'Noto Sans JP',-apple-system,'Hiragino Sans',sans-serif;background:#f0f4f8;color:#1a1a2e;min-height:100vh}

/* ══════════════════════════════════════════
   SETUP SCREEN
══════════════════════════════════════════ */
#setup-screen{
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:24px 16px;
  background:linear-gradient(160deg,#0f2744 0%,#1e4d7b 55%,#1a3a5c 100%);
}
.setup-logo{text-align:center;margin-bottom:32px}
.setup-logo .icon{font-size:52px;margin-bottom:14px;display:block}
.setup-logo h1{color:#fff;font-size:22px;font-weight:900;letter-spacing:1.5px}
.setup-logo p{color:rgba(255,255,255,0.4);font-size:12px;margin-top:5px}

.setup-card{
  background:white;border-radius:22px;padding:30px 24px;
  width:100%;max-width:420px;
  box-shadow:0 24px 80px rgba(0,0,0,0.35);
}
.setup-card h2{font-size:15px;font-weight:700;color:var(--navy);margin-bottom:24px;
  padding-bottom:14px;border-bottom:2px solid var(--gray-light)}

.form-group{margin-bottom:18px}
.form-group label{
  display:block;font-size:10px;color:var(--gray);font-weight:700;
  margin-bottom:7px;letter-spacing:0.8px;text-transform:uppercase
}
.form-group input{
  width:100%;padding:13px 15px;
  border:2px solid var(--border);border-radius:12px;
  font-size:15px;font-family:inherit;color:var(--navy);
  transition:all .2s;background:var(--gray-light)
}
.form-group input:focus{
  outline:none;border-color:var(--sky);background:white;
  box-shadow:0 0 0 4px rgba(14,165,233,0.12)
}
.hint{font-size:11px;color:#aaa;margin-top:6px}

.btn-login{
  width:100%;padding:16px;
  background:linear-gradient(135deg,#0f2744,#1e4d7b);
  color:white;border:none;border-radius:13px;
  font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;
  letter-spacing:0.5px;margin-top:6px;
  transition:transform .1s,opacity .15s;
  box-shadow:0 4px 16px rgba(15,39,68,0.3)
}
.btn-login:active{transform:scale(.98);opacity:.9}

/* ══════════════════════════════════════════
   APP SCREEN
══════════════════════════════════════════ */
#app-screen{display:none;flex-direction:column;min-height:100vh}

.app-header{
  background:linear-gradient(135deg,#0f2744 0%,#1a3a5c 100%);
  color:white;padding:14px 16px 12px;
  position:sticky;top:0;z-index:200;
  box-shadow:0 2px 20px rgba(15,39,68,0.45);
  display:flex;align-items:center;gap:10px
}
.header-back{
  background:rgba(255,255,255,0.12);border:none;color:white;
  border-radius:8px;padding:8px 11px;font-size:14px;
  cursor:pointer;font-family:inherit;flex-shrink:0
}
.header-info{flex:1;min-width:0}
.header-title{font-size:16px;font-weight:900;letter-spacing:.3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.header-sub{font-size:10px;opacity:.5;margin-top:2px}
.btn-reload{
  background:rgba(255,255,255,0.12);border:1.5px solid rgba(255,255,255,0.22);
  color:white;border-radius:8px;padding:8px 13px;
  font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;
  white-space:nowrap;transition:background .15s
}
.btn-reload:active{background:rgba(255,255,255,0.25)}
.btn-reload.spinning{opacity:.6;pointer-events:none}

/* Tab bar */
.tab-bar{
  background:white;border-bottom:2px solid var(--border);
  display:flex;position:sticky;top:57px;z-index:199;
  box-shadow:0 2px 8px rgba(0,0,0,0.04)
}
.tab-item{
  flex:1;padding:14px 8px;border:none;background:none;
  font-family:inherit;font-size:13px;font-weight:700;color:#bbb;
  border-bottom:3px solid transparent;margin-bottom:-2px;
  cursor:pointer;transition:all .2s;position:relative
}
.tab-item.active{color:var(--navy);border-bottom-color:var(--navy)}
.tab-badge{
  position:absolute;top:8px;right:12px;
  background:var(--amber);color:white;
  font-size:10px;font-weight:900;padding:2px 6px;
  border-radius:20px;min-width:18px;text-align:center
}

/* Content */
.content{padding:14px;flex:1}

/* ── NEW ORDER BANNER ── */
.new-banner{
  background:linear-gradient(135deg,var(--amber),#d97706);
  color:white;border-radius:13px;padding:13px 16px;
  margin-bottom:12px;display:flex;align-items:center;gap:10px;
  box-shadow:0 4px 16px rgba(245,158,11,0.35);
  animation:slideDown .3s ease
}
@keyframes slideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.new-banner .nb-icon{font-size:22px;flex-shrink:0}
.new-banner .nb-text strong{display:block;font-size:14px;font-weight:900}
.new-banner .nb-text span{font-size:11px;opacity:.85}
.new-banner .nb-close{
  margin-left:auto;background:rgba(255,255,255,0.25);
  border:none;color:white;border-radius:6px;
  padding:4px 9px;font-size:12px;cursor:pointer;font-family:inherit
}

/* ── SYNC BAR ── */
.sync-bar{
  background:white;border-radius:11px;padding:10px 14px;
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:12px;border:1px solid var(--border);
  box-shadow:var(--shadow-sm)
}
.sync-count{font-size:13px;font-weight:700;color:var(--navy)}
.sync-time{font-size:11px;color:var(--gray)}

/* ── COMMENT PANEL ── */
.comment-panel{
  background:white;border-radius:13px;border:2px solid var(--amber-border);
  margin-bottom:12px;overflow:hidden;box-shadow:var(--shadow-sm)
}
.comment-panel-header{
  padding:12px 16px;display:flex;align-items:center;gap:10px;
  cursor:pointer;user-select:none
}
.comment-panel-header:active{background:var(--amber-light)}
.cp-icon{font-size:16px}
.cp-title{font-size:13px;font-weight:700;color:#92400e;flex:1}
.cp-arrow{font-size:12px;color:#b45309;transition:transform .2s}
.cp-arrow.open{transform:rotate(180deg)}
.comment-panel-body{display:none;border-top:1px solid var(--amber-border)}
.comment-panel-body.open{display:block}
.cp-row{
  padding:11px 16px;border-bottom:1px solid #fef3c7;
  display:flex;flex-direction:column;gap:3px
}
.cp-row:last-child{border-bottom:none}
.cp-store{font-size:11px;font-weight:700;color:#92400e}
.cp-text{font-size:13px;color:#78350f}

/* ── PRODUCT CARD ── */
.product-card{
  background:white;border-radius:16px;
  border:2px solid var(--border);margin-bottom:12px;
  overflow:hidden;box-shadow:var(--shadow-sm);
  transition:border-color .2s
}
.product-card.is-new{border-color:var(--amber);background:var(--amber-light)}
.product-card-header{
  padding:14px 16px 10px;
  border-bottom:1px solid var(--border);
  background:var(--gray-light)
}
.product-name{font-size:19px;font-weight:900;color:var(--navy);line-height:1.2}
.product-new-pill{
  display:inline-block;background:var(--amber);color:white;
  font-size:9px;font-weight:900;padding:2px 7px;
  border-radius:20px;letter-spacing:.5px;margin-bottom:4px
}
.store-row{
  padding:11px 16px;border-bottom:1px solid #f8fafc;
  display:flex;justify-content:space-between;align-items:center;gap:10px
}
.store-row:last-child{border-bottom:none}
/* Batch colors — subtle, 3 levels */
.store-row.is-new-1{background:#fffbeb;border-left:3px solid #f59e0b;padding-left:13px}
.store-row.is-new-2{background:#f0f9ff;border-left:3px solid #0ea5e9;padding-left:13px}
.store-row.is-new-3{background:#f5f3ff;border-left:3px solid #8b5cf6;padding-left:13px}
.new-time{font-size:10px;color:#94a3b8;display:block;margin-top:2px}
.store-code-block{display:flex;flex-direction:column;gap:2px;min-width:0}
.store-code{
  font-size:18px;font-weight:900;color:var(--navy);line-height:1
}
.store-name-short{
  font-size:11px;color:#94a3b8;font-weight:500;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis
}
.store-variant{
  font-size:10px;color:#b0bac4;margin-top:1px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis
}
.store-qty{font-size:16px;font-weight:900;color:var(--navy);text-align:right}
.store-unit{font-size:11px;color:var(--gray);text-align:right}

/* ── EMPTY STATE ── */
.empty{text-align:center;padding:60px 20px;color:var(--gray)}
.empty .eicon{font-size:48px;margin-bottom:14px}
.empty p{font-size:14px}

/* ── HISTORY ── */
.history-day{
  background:white;border-radius:13px;border:1px solid var(--border);
  margin-bottom:10px;overflow:hidden;box-shadow:var(--shadow-sm)
}
.hday-header{
  padding:13px 16px;display:flex;justify-content:space-between;
  align-items:center;cursor:pointer;user-select:none
}
.hday-header:active{background:var(--gray-light)}
.hday-date{font-size:14px;font-weight:700;color:var(--navy)}
.hday-right{display:flex;align-items:center;gap:8px}
.hday-count{font-size:12px;color:var(--gray)}
.hday-arrow{font-size:12px;color:var(--gray);transition:transform .2s}
.hday-arrow.open{transform:rotate(180deg)}
.hday-body{display:none;border-top:1px solid var(--border)}
.hday-body.open{display:block}
.hday-row{
  padding:11px 16px;border-bottom:1px solid #f8fafc;
  display:flex;justify-content:space-between;align-items:center
}
.hday-row:last-child{border-bottom:none}
.hday-item{font-size:13px;font-weight:700;color:var(--navy)}
.hday-store{font-size:11px;color:#94a3b8;margin-top:2px}
.hday-qty{font-size:13px;color:var(--gray);white-space:nowrap;margin-left:8px}

/* ══════════════════════════════════════════
   ADMIN VIEW
══════════════════════════════════════════ */
.admin-notice{
  font-size:11px;color:#92400e;
  background:#fef3c7;border:1px solid #fde68a;
  border-radius:9px;padding:10px 14px;
  margin-bottom:14px;text-align:center
}
.admin-groups{
  display:flex;overflow-x:auto;scrollbar-width:none;
  gap:7px;padding-bottom:12px
}
.admin-groups::-webkit-scrollbar{display:none}
.agroup-btn{
  white-space:nowrap;padding:8px 15px;
  background:white;border:2px solid var(--border);
  border-radius:20px;font-size:12px;font-weight:700;
  color:var(--gray);cursor:pointer;transition:all .15s;font-family:inherit
}
.agroup-btn.active{background:var(--navy);color:white;border-color:var(--navy)}

.admin-group-bar{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:12px
}
.admin-group-label{font-size:15px;font-weight:900;color:var(--navy)}
.btn-add{
  padding:8px 15px;background:var(--sky);color:white;
  border:none;border-radius:9px;font-size:12px;font-weight:700;
  font-family:inherit;cursor:pointer
}

.admin-card{
  background:white;border-radius:14px;border:1.5px solid var(--border);
  margin-bottom:9px;overflow:hidden;box-shadow:var(--shadow-sm);transition:all .2s
}
.admin-card.is-new{border-color:var(--amber);background:var(--amber-light)}
.admin-card.deleted{opacity:.4;border-color:#fca5a5;background:var(--red-light)}
.acard-body{padding:13px 14px}
.acard-store{font-size:11px;color:var(--sky);font-weight:700;margin-bottom:5px;display:flex;align-items:center;gap:5px}
.acard-item{font-size:15px;font-weight:700;color:var(--navy);margin-bottom:10px}
.acard-fields{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:9px}
.acard-field label{font-size:10px;color:var(--gray);font-weight:700;display:block;margin-bottom:5px;letter-spacing:.3px}
.acard-field input,.acard-cmt input{
  width:100%;padding:9px 11px;border:1.5px solid var(--border);
  border-radius:9px;font-size:14px;font-family:inherit;color:var(--navy);
  transition:border-color .2s;background:var(--gray-light)
}
.acard-field input:focus,.acard-cmt input:focus{
  outline:none;border-color:var(--sky);background:white
}
.acard-cmt{margin-bottom:0}
.acard-cmt label{font-size:10px;color:var(--gray);font-weight:700;display:block;margin-bottom:5px}
.acard-footer{
  border-top:1px solid var(--border);padding:9px 14px;
  display:flex;gap:8px;justify-content:flex-end
}
.btn-save{
  padding:8px 18px;background:var(--green);color:white;
  border:none;border-radius:8px;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer
}
.btn-del{
  padding:8px 14px;background:var(--red-light);color:var(--red);
  border:1px solid #fca5a5;border-radius:8px;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer
}
.btn-restore{
  padding:8px 14px;background:var(--sky-light);color:#0369a1;
  border:1px solid #bae6fd;border-radius:8px;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer
}

/* ══════════════════════════════════════════
   NOTE MODAL
══════════════════════════════════════════ */
.modal-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,0.5);z-index:998;
  align-items:flex-end;backdrop-filter:blur(4px)
}
.modal-overlay.show{display:flex}
.modal-box{
  background:white;width:100%;border-radius:22px 22px 0 0;
  padding:24px 18px 44px;
}
.modal-handle{width:40px;height:4px;background:#ddd;border-radius:2px;margin:0 auto 20px}
.modal-box h3{font-size:16px;font-weight:900;color:var(--navy);margin-bottom:5px}
.modal-box p{font-size:12px;color:var(--gray);margin-bottom:16px}
.modal-box textarea{
  width:100%;padding:13px 15px;border:2px solid var(--border);
  border-radius:13px;font-size:14px;font-family:inherit;
  resize:none;height:100px;color:var(--navy);
  transition:border-color .2s;background:var(--gray-light)
}
.modal-box textarea:focus{outline:none;border-color:var(--sky);background:white}
.modal-btns{display:flex;gap:10px;margin-top:12px}
.modal-cancel{
  flex:1;padding:14px;background:var(--gray-light);color:var(--navy);
  border:1.5px solid var(--border);border-radius:11px;
  font-size:14px;font-weight:700;font-family:inherit;cursor:pointer
}
.modal-save{
  flex:2;padding:14px;background:var(--navy);color:white;
  border:none;border-radius:11px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer
}

/* ══════════════════════════════════════════
   LOADING & TOAST
══════════════════════════════════════════ */
#loading{
  display:none;position:fixed;inset:0;
  background:rgba(15,39,68,0.45);backdrop-filter:blur(4px);
  align-items:center;justify-content:center;z-index:999
}
#loading.show{display:flex}
.loading-box{
  background:white;border-radius:20px;padding:32px 44px;
  text-align:center;box-shadow:0 24px 60px rgba(0,0,0,0.22)
}
.spinner{
  width:38px;height:38px;border:3.5px solid #e2e8f0;
  border-top-color:var(--navy);border-radius:50%;
  animation:spin .75s linear infinite;margin:0 auto 16px
}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-box p{font-size:13px;color:var(--gray);font-weight:600}

#toast{
  position:fixed;bottom:28px;left:50%;
  transform:translateX(-50%) translateY(10px);
  background:var(--navy);color:white;
  padding:11px 24px;border-radius:24px;
  font-size:13px;font-weight:700;opacity:0;
  transition:all .25s;z-index:1000;
  white-space:nowrap;pointer-events:none;
  box-shadow:0 6px 24px rgba(15,39,68,0.4)
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.success{background:var(--green)}
#toast.warn{background:var(--amber)}
#toast.error{background:var(--red)}

.store-row.is-cancelled{
  opacity:.55;
  border-left:3px solid var(--red);
  padding-left:13px;
  background:#fff5f5
}
.cancelled-msg{
  font-size:11px;color:var(--red);margin-top:3px;
  font-style:italic
}
.store-qty.cancelled{text-decoration:line-through;color:#aaa}
.footer-link{text-align:center;padding:24px 0 32px}
.footer-link a{font-size:11px;color:#ccc;cursor:pointer}
</style>
</head>
<body>

<!-- ════════════════════════════════════════
     SETUP SCREEN
════════════════════════════════════════ -->
<div id="setup-screen">
  <div class="setup-logo">
    <span class="icon">📦</span>
    <h1>注文確認システム</h1>
    <p>Order Viewer v2.0</p>
  </div>
  <div class="setup-card">
    <h2>🔐 ログイン</h2>
    <!-- URL field: only shown when NOT served by GAS -->
    <div class="form-group" id="url-field-group" style="display:none">
      <label>GAS Web App URL</label>
      <input type="url" id="gas-url" autocomplete="off" spellcheck="false">
    </div>
    <div class="form-group">
      <label>グループコード</label>
      <input type="password" id="login-code" inputmode="numeric" autocomplete="off">
    </div>
    <button class="btn-login" onclick="doLogin()">確認する →</button>
  </div>
</div>

<!-- ════════════════════════════════════════
     APP SCREEN
════════════════════════════════════════ -->
<div id="app-screen">

  <!-- Header -->
  <div class="app-header">
    <button class="header-back" onclick="doLogout()">←</button>
    <div class="header-info">
      <div class="header-title" id="header-title">─</div>
      <div class="header-sub" id="header-sub">─</div>
    </div>
    <button class="btn-reload" id="btn-reload" onclick="loadData()">🔄 更新</button>
    <button class="btn-reload" id="btn-url-settings" style="display:none" onclick="openUrlSettings()">⚙️</button>
  </div>

  <!-- ── PARTNER VIEW ── -->
  <div id="partner-view" style="display:none;flex-direction:column;flex:1">
    <div class="tab-bar">
      <button class="tab-item active" id="tab-today" onclick="switchTab('today')">📋 今日の注文</button>
      <button class="tab-item" id="tab-history" onclick="switchTab('history')">
        📅 履歴
        <span class="tab-badge" id="history-badge" style="display:none"></span>
      </button>
    </div>
    <div class="content">
      <!-- Today panel -->
      <div id="panel-today">
        <div id="new-banner" style="display:none"></div>
        <div class="sync-bar">
          <span class="sync-count" id="order-count">─</span>
          <span class="sync-time" id="sync-time">─</span>
        </div>
        <div id="orders-list"></div>
      </div>
      <!-- History panel -->
      <div id="panel-history" style="display:none">
        <div id="history-list"></div>
      </div>
    </div>
    <div class="footer-link"><a onclick="doLogout()">← 設定に戻る</a></div>
  </div>

  <!-- ── ADMIN VIEW ── -->
  <div id="admin-view" style="display:none;flex-direction:column;flex:1">
    <div class="content">
      <div id="admin-new-banner" style="display:none"></div>
      <div class="admin-notice">⚠️ 編集はアプリ内のみ保存 — シートには反映されません</div>
      <div class="admin-groups" id="admin-groups"></div>
      <div class="admin-group-bar">
        <div class="admin-group-label" id="admin-group-label">全グループ</div>
        <button class="btn-add" onclick="addAdminRow()">＋ 追加</button>
      </div>
      <div id="admin-list"></div>
    </div>
    <div class="footer-link"><a onclick="doLogout()">← 設定に戻る</a></div>
  </div>

</div>

<!-- URL Settings Modal (admin only) -->
<div class="modal-overlay" id="url-modal">
  <div class="modal-box">
    <div class="modal-handle"></div>
    <h3>⚙️ GAS URL 設定</h3>
    <p style="font-size:12px;color:var(--gray);margin-bottom:14px">URLを変更すると全員に反映されます</p>
    <input type="url" id="url-modal-input" autocomplete="off" spellcheck="false"
      style="width:100%;padding:12px 14px;border:2px solid var(--border);border-radius:12px;font-size:13px;font-family:inherit;color:var(--navy);background:var(--gray-light);margin-bottom:14px">
    <div class="modal-btns">

<div class="modal-overlay" id="note-modal">
  <div class="modal-box">
    <div class="modal-handle"></div>
    <h3>📝 メモを入力</h3>
    <p id="note-modal-label">─</p>
    <textarea id="note-textarea" placeholder="メモを入力してください..."></textarea>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeNoteModal()">キャンセル</button>
      <button class="modal-save" onclick="saveNote()">保存する</button>

<!-- Loading -->
<div id="loading">
  <div class="loading-box">
    <div class="spinner"></div>
    <p id="loading-text">データを取得中...</p>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
// ══════════════════════════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════════════════════════
var CODE_LABELS = {
  100:'市）グループ',101:'丸）グループ',102:'中）グループ',
  103:'え）グループ',104:'貴）グループ',105:'若）グループ',
  106:'立）グループ',107:'梅）グループ',108:'フ）グループ',
  109:'食）グループ',111:'板）グループ'
};

// 取引先の短縮名（Script 2 の NAME_MAP と同一）
var NAME_MAP = {
  2:'大晴海', 3:'海の路', 4:'板付製造', 5:'魚蔵', 6:'どげん海', 7:'板付鮮魚',
  8:'萬漁箱', 9:'せんせんせん', 10:'一承', 11:'山尾天神',
  12:'山尾博多', 13:'山尾西新', 14:'魚屋', 15:'藤う那天神',
  17:'フタクチ', 18:'野が海', 20:'又', 21:'飛うお', 22:'とりとりと', 30:'藤う那博多'
};

// 商品名のバリアント統合（このキーワードを含む商品は1グループに）
var VARIANT_GROUPS = [
  'アナゴ',
  'カツオ',
  'イサキ'
];

var ADMIN_CODE   = '999';
var HISTORY_DAYS = 7;

// ══════════════════════════════════════════════════════════════
// ★ Admin: URLをここに貼り付けてください（変更時はこの1行だけ）
// ══════════════════════════════════════════════════════════════
var DEFAULT_GAS_URL = 'https://script.google.com/macros/s/AKfycbyYMX11UjruGgm3NJw9cJmPQ02n3vZOhAkX_WyCV7Uhsv65RbOAHGmvQH51PgxpIH8/exec';

// ══════════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════════
var gasUrl       = store('get','gas_url') || DEFAULT_GAS_URL;
var loginCode    = '';
var isAdmin      = false;
var todayOrders  = [];
var newOrderKeys = {};
var adminEdits   = {};
var adminAdded   = [];
var currentGroup = 'all';
var noteTargetKey= '';
var noteTargetIdx= -1;

// ══════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════
(function init() {
  var code = store('get','gas_code') || '';
  if (code) document.getElementById('login-code').value = code;
})();

// ══════════════════════════════════════════════════════════════
// LOGIN / LOGOUT
// ══════════════════════════════════════════════════════════════
function doLogin() {
  var code = document.getElementById('login-code').value.trim();
  if (!code) { showToast('コードを入力してください','error'); return; }
  store('set','gas_code', code);
  loginCode = code;
  isAdmin   = (code === ADMIN_CODE);
  if (isAdmin) document.getElementById('btn-url-settings').style.display = 'block';
  loadData();
}

function doLogout() {
  document.getElementById('setup-screen').style.display  = 'flex';
  document.getElementById('app-screen').style.display    = 'none';
  document.getElementById('partner-view').style.display  = 'none';
  document.getElementById('admin-view').style.display    = 'none';
  document.getElementById('btn-url-settings').style.display = 'none';
}

// ── URL Settings (admin only) ──
function openUrlSettings() {
  document.getElementById('url-modal-input').value = gasUrl;
  document.getElementById('url-modal').classList.add('show');
}
function closeUrlSettings() { document.getElementById('url-modal').classList.remove('show'); }
function saveUrlSettings() {
  var newUrl = document.getElementById('url-modal-input').value.trim();
  if (!newUrl) return;
  gasUrl = newUrl;
  store('set','gas_url', gasUrl);
  closeUrlSettings();
  loadData();
  showToast('URL更新しました','success');
}

// ══════════════════════════════════════════════════════════════
// FETCH DATA
// ══════════════════════════════════════════════════════════════
function loadData() {
  var reloadBtn = document.getElementById('btn-reload');
  reloadBtn.classList.add('spinning');
  showLoading('データを取得中...');

  var code    = isAdmin ? 'all' : loginCode;
  var dateStr = todayKey().replace('snap_','');
  var ordersUrl  = gasUrl + '?action=getOrders&code=' + encodeURIComponent(code);
  var deletedUrl = gasUrl + '?action=getDeleted&date=' + encodeURIComponent(dateStr);

  Promise.all([
    fetch(ordersUrl).then(function(r){ return r.json(); }),
    fetch(deletedUrl).then(function(r){ return r.json(); }).catch(function(){ return { deleted:[] }; })
  ])
  .then(function(results){
    hideLoading();
    reloadBtn.classList.remove('spinning');
    var json    = results[0];
    var delJson = results[1];
    if (!json.success) { showToast(json.error || 'エラーが発生しました','error'); return; }

    // Store deleted fingerprints (from GAS, shared across all devices)
    var deletedFps = {};
    (delJson.deleted || []).forEach(function(fp){ deletedFps[fp] = true; });
    store('set','gas_deleted_'+todayKey(), JSON.stringify(deletedFps));

    var freshOrders = json.orders || [];
    detectNewOrders(freshOrders);
    todayOrders = freshOrders;
    saveSnapshot(freshOrders);

    document.getElementById('setup-screen').style.display = 'none';
    document.getElementById('app-screen').style.display   = 'flex';

    if (isAdmin) {
      renderAdmin(json.syncDate || '');
    } else {
      renderPartner(json.syncDate || '');
    }
  })
  .catch(function(e){
    hideLoading();
    reloadBtn.classList.remove('spinning');
    showToast('通信エラー: ' + e.message,'error');
  });
}

function getGasDeleted() {
  return JSON.parse(store('get','gas_deleted_'+todayKey()) || '{}');
}

// ══════════════════════════════════════════════════════════════
// NEW ORDER DETECTION
// ══════════════════════════════════════════════════════════════
function orderFingerprint(o) {
  return [o.custCode, o.itemCode, o.itemName, o.qty, o.unit].join('|');
}

function detectNewOrders(freshOrders) {
  newOrderKeys = {};
  var prevRaw = store('get', todayKey());
  if (!prevRaw) return;

  var prevOrders = JSON.parse(prevRaw);
  var prevSet = {};
  prevOrders.forEach(function(o){ prevSet[orderFingerprint(o)] = true; });

  var newFound = [];
  freshOrders.forEach(function(o, i){
    if (!prevSet[orderFingerprint(o)]) {
      newFound.push(i);
      newOrderKeys[i] = true;
    }
  });

  if (newFound.length > 0) {
    // Increment batch counter (max 3)
    var batchNum = Math.min(parseInt(store('get','batchnum_'+todayKey())||'0') + 1, 3);
    store('set','batchnum_'+todayKey(), batchNum);

    var batches = JSON.parse(store('get','batches_'+todayKey())||'{}');
    var hm = pad(new Date().getHours())+':'+pad(new Date().getMinutes());
    newFound.forEach(function(i){
      batches[orderFingerprint(freshOrders[i])] = { b: batchNum, t: hm };
    });
    store('set','batches_'+todayKey(), JSON.stringify(batches));
  }
}

function getAdminDeleted() {
  return JSON.parse(store('get','admin_del_'+todayKey()) || '{}');
}
function setAdminDeleted(fp, val) {
  var d = getAdminDeleted();
  if (val) d[fp] = true; else delete d[fp];
  store('set','admin_del_'+todayKey(), JSON.stringify(d));
}

function getBatchInfo(o) {
  var batches = JSON.parse(store('get','batches_'+todayKey())||'{}');
  return batches[orderFingerprint(o)] || null;
}

function getNewInfo() {
  var count = Object.keys(newOrderKeys).length;
  var hm = count > 0 ? pad(new Date().getHours())+':'+pad(new Date().getMinutes()) : '';
  return { count: count, time: hm };
}

// ══════════════════════════════════════════════════════════════
// SNAPSHOT STORAGE
// ══════════════════════════════════════════════════════════════
function saveSnapshot(orders) {
  // Ghi đè snapshot hôm nay — lần load tiếp theo sẽ so sánh với cái này
  store('set', todayKey(), JSON.stringify(orders));
  pruneSnapshots();
}

function todayKey() {
  var d = new Date();
  return 'snap_' + d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate());
}

function getDateStr() {
  var d = new Date();
  return d.getFullYear() + '/' + pad(d.getMonth()+1) + '/' + pad(d.getDate());
}

function pruneSnapshots() {
  var keys = [];
  for (var i=0;i<localStorage.length;i++){
    var k = localStorage.key(i);
    if (k && k.match(/^snap_\d{4}-\d{2}-\d{2}$/)){ keys.push(k); }
  }
  keys.sort().reverse().slice(HISTORY_DAYS).forEach(function(k){
    localStorage.removeItem(k);
    localStorage.removeItem('batches_'+k);
    localStorage.removeItem('batchnum_'+k);
  });
}

// ══════════════════════════════════════════════════════════════
// PARTNER VIEW
// ══════════════════════════════════════════════════════════════
function renderPartner(syncDate) {
  var label = CODE_LABELS[Number(loginCode)] || ('コード ' + loginCode);
  document.getElementById('header-title').textContent = label;
  document.getElementById('header-sub').textContent   = getDateStr() + (syncDate ? '　同期: ' + syncDate : '');

  document.getElementById('partner-view').style.display = 'flex';
  document.getElementById('admin-view').style.display   = 'none';

  document.getElementById('order-count').textContent = todayOrders.length + ' 件';
  document.getElementById('sync-time').textContent   = syncDate ? '最終: ' + syncDate : '─';

  renderNewBanner('new-banner', false);
  renderOrdersList();
  renderHistoryList();
  switchTab('today');
}

function renderNewBanner(elId, isAdmin) {
  var info = getNewInfo();
  var el   = document.getElementById(elId);
  if (info.count > 0) {
    el.style.display = 'block';
    el.innerHTML =
      '<div class="new-banner">' +
      '  <div class="nb-icon">🆕</div>' +
      '  <div class="nb-text">' +
      '    <strong>' + info.count + '件の新しい注文が追加されました</strong>' +
      '    <span>本日 ' + info.time + ' に更新</span>' +
      '  </div>' +
      '  <button class="nb-close" onclick="dismissBanner(\'' + elId + '\')">✕</button>' +
      '</div>';
  } else {
    el.style.display = 'none';
  }
}

function dismissBanner(elId) {
  document.getElementById(elId).style.display = 'none';
  newOrderKeys = {}; // xóa in-memory, không hiện lại cho đến khi có đơn mới thật
}

function getShortName(custCode) {
  return NAME_MAP[Number(custCode)] || null;
}

// 1.0 → 1 / 1.50 → 1.5 / 30.00 → 30
function fmtQty(val) {
  var n = parseFloat(val);
  if (isNaN(n)) return val;
  return parseFloat(n.toFixed(2)).toString();
}

// キーワードにマッチするVARIANT_GROUPSのキーワードを返す（なければnull）
function getVariantKeyword(itemName) {
  for (var i = 0; i < VARIANT_GROUPS.length; i++) {
    if (itemName.indexOf(VARIANT_GROUPS[i]) !== -1) return VARIANT_GROUPS[i];
  }
  return null;
}

function renderOrdersList() {
  var el = document.getElementById('orders-list');
  if (todayOrders.length === 0) {
    el.innerHTML = '<div class="empty"><div class="eicon">📭</div><p>本日の注文はありません</p></div>';
    return;
  }

  // ── Comment panel ──
  var commentMap = {};
  todayOrders.forEach(function(o) {
    if (o.comment && !commentMap[o.custCode]) {
      commentMap[o.custCode] = { name: getShortName(o.custCode) || o.custName, text: o.comment };
    }
  });
  var commentEntries = Object.keys(commentMap);
  var cpHtml = '';
  if (commentEntries.length > 0) {
    var cpRows = commentEntries.map(function(code) {
      var c = commentMap[code];
      return '<div class="cp-row"><div class="cp-store">' + esc(code + ' ' + c.name) + '</div><div class="cp-text">' + esc(c.text) + '</div></div>';
    }).join('');
    cpHtml =
      '<div class="comment-panel">' +
      '  <div class="comment-panel-header" onclick="toggleCommentPanel(this)">' +
      '    <span class="cp-icon">📌</span>' +
      '    <span class="cp-title">コメントあり（' + commentEntries.length + '件）</span>' +
      '    <span class="cp-arrow">▾</span>' +
      '  </div>' +
      '  <div class="comment-panel-body">' + cpRows + '</div>' +
      '</div>';
  }

  // ── Group orders by product / variant keyword ──
  var groups   = {};   // groupKey → { label, entries[] }
  var groupOrder = [];

  todayOrders.forEach(function(o, i) {
    var kw       = getVariantKeyword(o.itemName);
    var groupKey = kw || o.itemName;
    if (!groups[groupKey]) {
      groups[groupKey] = { label: kw || o.itemName, isVariant: !!kw, entries: [] };
      groupOrder.push(groupKey);
    }
    groups[groupKey].entries.push({ o: o, i: i });
  });

  // Sort entries inside each group by custCode ascending
  groupOrder.forEach(function(key) {
    groups[key].entries.sort(function(a, b) {
      return parseFloat(a.o.custCode) - parseFloat(b.o.custCode);
    });
  });

  var cardsHtml = groupOrder.map(function(key) {
    return buildProductCard(groups[key]);
  }).join('');

  el.innerHTML = cpHtml + cardsHtml;
}

function buildProductCard(group) {
  var isVariant = group.isVariant;

  var rowsHtml = group.entries.map(function(entry) {
    var o         = entry.o;
    var fp        = orderFingerprint(o);
    var cancelled = !!getGasDeleted()[fp];
    var bInfo     = getBatchInfo(o);
    var batchCls  = cancelled ? ' is-cancelled' : (bInfo ? ' is-new-' + bInfo.b : '');
    var timeBadge = (!cancelled && bInfo) ? '<span class="new-time">' + bInfo.t + '</span>' : '';
    var cancelMsg = cancelled
      ? '<div class="cancelled-msg">大変申し訳ございません。こちらの注文はキャンセルとなりました。</div>' : '';
    var shortName = getShortName(o.custCode);
    var variantLabel = isVariant ? '<div class="store-variant">' + esc(o.itemName) + '</div>' : '';
    return [
      '<div class="store-row' + batchCls + '">',
      '  <div class="store-code-block">',
      '    <div class="store-code">' + esc(o.custCode) + '</div>',
      '    <div class="store-name-short">' + esc(shortName || o.custName) + '</div>',
      variantLabel, timeBadge, cancelMsg,
      '  </div>',
      '  <div style="text-align:right;flex-shrink:0">',
      '    <div class="store-qty' + (cancelled ? ' cancelled' : '') + '">' + fmtQty(o.qty) + '</div>',
      '    <div class="store-unit">' + esc(o.unit) + '</div>',
      '  </div>',
      '</div>'
    ].join('');
  }).join('');

  return [
    '<div class="product-card">',
    '  <div class="product-card-header">',
    '    <div class="product-name">' + esc(group.label) + '</div>',
    '  </div>',
    rowsHtml,
    '</div>'
  ].join('');
}

function toggleCommentPanel(header) {
  var body  = header.nextElementSibling;
  var arrow = header.querySelector('.cp-arrow');
  var open  = body.classList.toggle('open');
  arrow.classList.toggle('open', open);
}

function switchTab(tab) {
  document.getElementById('tab-today').classList.toggle('active',   tab==='today');
  document.getElementById('tab-history').classList.toggle('active', tab==='history');
  document.getElementById('panel-today').style.display   = tab==='today'   ? 'block':'none';
  document.getElementById('panel-history').style.display = tab==='history' ? 'block':'none';
}

// ══════════════════════════════════════════════════════════════
// NOTE MODAL
// ══════════════════════════════════════════════════════════════
function openNoteModal(idx) {
  noteTargetIdx = idx;
  var o = todayOrders[idx];
  noteTargetKey = orderKey(idx, o);
  document.getElementById('note-modal-label').textContent = o.custName + ' / ' + o.itemName;
  document.getElementById('note-textarea').value = store('get','note_'+noteTargetKey) || '';
  document.getElementById('note-modal').classList.add('show');
  setTimeout(function(){ document.getElementById('note-textarea').focus(); },150);
}

function closeNoteModal() { document.getElementById('note-modal').classList.remove('show'); }

function saveNote() {
  var text = document.getElementById('note-textarea').value.trim();
  store('set','note_'+noteTargetKey, text);
  closeNoteModal();
  renderOrdersList();
  showToast('メモを保存しました','success');
}

// ══════════════════════════════════════════════════════════════
// HISTORY
// ══════════════════════════════════════════════════════════════
function renderHistoryList() {
  var el     = document.getElementById('history-list');
  var today  = todayKey();
  var keys   = [];
  for (var i=0;i<localStorage.length;i++){
    var k = localStorage.key(i);
    if (k && k.match(/^snap_\d{4}-\d{2}-\d{2}$/) && k !== today){ keys.push(k); }
  }
  keys.sort().reverse();

  // Update badge
  var badge = document.getElementById('history-badge');
  if (keys.length > 0){ badge.style.display='inline';badge.textContent=keys.length; }
  else { badge.style.display='none'; }

  if (keys.length === 0) {
    el.innerHTML = '<div class="empty"><div class="eicon">📅</div><p>履歴がありません<br><small>翌日以降に表示されます</small></p></div>';
    return;
  }
  el.innerHTML = keys.map(function(k){
    var dateStr  = k.replace('snap_','').replace(/-/g,'/');
    var raw      = store('get',k) || '[]';
    var all      = JSON.parse(raw);
    var filtered = isAdmin ? all : all.filter(function(o){ return String(o.itemCode)===loginCode; });
    return [
      '<div class="history-day">',
      '  <div class="hday-header" onclick="toggleHistoryDay(this)">',
      '    <div class="hday-date">📅 ' + dateStr + '</div>',
      '    <div class="hday-right">',
      '      <span class="hday-count">' + filtered.length + '件</span>',
      '      <span class="hday-arrow">▾</span>',
      '    </div>',
      '  </div>',
      '  <div class="hday-body">',
      filtered.length === 0
        ? '<div style="padding:14px;color:#aaa;font-size:13px;text-align:center">データなし</div>'
        : filtered.map(function(o){
            return '<div class="hday-row">' +
              '<div>' +
              '<div class="hday-item">'+esc(o.itemName)+'</div>' +
              '<div class="hday-store">'+esc(o.custCode+' '+o.custName)+'</div>' +
              '</div>' +
              '<div class="hday-qty">'+o.qty+' '+esc(o.unit)+'</div>' +
              '</div>';
          }).join(''),
      '  </div>',
      '</div>'
    ].join('');
  }).join('');
}

function toggleHistoryDay(header) {
  var body  = header.nextElementSibling;
  var arrow = header.querySelector('.hday-arrow');
  var open  = body.classList.toggle('open');
  arrow.classList.toggle('open', open);
}

// ══════════════════════════════════════════════════════════════
// ADMIN VIEW — same product-grouped format as partner
// ══════════════════════════════════════════════════════════════
var adminEditTarget = null; // { key, isAdded, o }

function renderAdmin(syncDate) {
  document.getElementById('header-title').textContent = '管理者画面';
  document.getElementById('header-sub').textContent   = getDateStr() + (syncDate ? '　同期: ' + syncDate : '');
  document.getElementById('partner-view').style.display = 'none';
  document.getElementById('admin-view').style.display   = 'flex';

  adminEdits = JSON.parse(store('get','admin_edits_'+todayKey()) || '{}');
  adminAdded = JSON.parse(store('get','admin_added_'+todayKey()) || '[]');

  renderNewBanner('admin-new-banner', true);

  // Group tabs
  var groupSet = {};
  todayOrders.forEach(function(o){ if(o.itemCode) groupSet[String(o.itemCode)]=true; });
  adminAdded.forEach(function(r){ if(r.itemCode && !r.deleted) groupSet[String(r.itemCode)]=true; });
  var groups = Object.keys(groupSet).map(Number).filter(Boolean).sort(function(a,b){return a-b;});

  var tabsEl = document.getElementById('admin-groups');
  tabsEl.innerHTML = ['all'].concat(groups).map(function(c){
    var lbl = c==='all' ? '全て' : (CODE_LABELS[c]||'コード'+c);
    return '<button class="agroup-btn'+(c==='all'?' active':'')+'" data-code="'+c+'" onclick="selectAdminGroup(\''+c+'\')">'+lbl+'</button>';
  }).join('');

  currentGroup = 'all';
  renderAdminList();
}

function selectAdminGroup(code) {
  currentGroup = code;
  document.querySelectorAll('.agroup-btn').forEach(function(b){
    b.classList.toggle('active', b.dataset.code === String(code));
  });
  renderAdminList();
}

function renderAdminList() {
  adminEdits = JSON.parse(store('get','admin_edits_'+todayKey()) || '{}');
  adminAdded = JSON.parse(store('get','admin_added_'+todayKey()) || '[]');

  // Build rows
  var allRows = todayOrders.map(function(o, i){
    var key  = orderKey(i, o);
    var edit = adminEdits[key] || {};
    return {
      key: key, i: i, isAdded: false,
      o: o,
      qty:     edit.qty     !== undefined ? edit.qty     : o.qty,
      unit:    edit.unit    !== undefined ? edit.unit    : o.unit,
      comment: edit.comment !== undefined ? edit.comment : (o.comment||''),
      deleted: !!edit.deleted
    };
  });
  adminAdded.forEach(function(r, i){
    allRows.push({
      key:'added_'+i, i:-1, isAdded:true,
      o:{ custCode:r.custCode||'?', custName:r.custName||'', itemCode:r.itemCode||'', itemName:r.itemName||'新規' },
      qty:r.qty||'', unit:r.unit||'', comment:r.comment||'', deleted:!!r.deleted
    });
  });

  // Filter by group
  var rows = currentGroup === 'all' ? allRows
    : allRows.filter(function(r){ return String(r.o.itemCode)===String(currentGroup); });

  var lbl = currentGroup==='all' ? '全グループ' : (CODE_LABELS[Number(currentGroup)]||'コード'+currentGroup);
  document.getElementById('admin-group-label').textContent = lbl + '（'+rows.filter(function(r){return !r.deleted;}).length+'件）';

  var el = document.getElementById('admin-list');
  if (rows.length === 0) {
    el.innerHTML = '<div class="empty"><div class="eicon">📭</div><p>データなし</p></div>';
    return;
  }

  // Group by product (same as partner)
  var groups = {}, groupOrder = [];
  rows.filter(function(r){return !r.deleted;}).forEach(function(r){
    var kw = getVariantKeyword(r.o.itemName);
    var gk = kw || r.o.itemName;
    if (!groups[gk]) { groups[gk] = { label: kw||r.o.itemName, rows:[] }; groupOrder.push(gk); }
    groups[gk].rows.push(r);
  });
  groupOrder.forEach(function(k){
    groups[k].rows.sort(function(a,b){ return parseFloat(a.o.custCode)-parseFloat(b.o.custCode); });
  });

  // Deleted rows section
  var deletedRows = rows.filter(function(r){return r.deleted;});
  var deletedHtml = deletedRows.length === 0 ? '' :
    '<div style="margin-top:12px"><div style="font-size:11px;color:#aaa;font-weight:700;padding:6px 0">🗑 削除済み</div>' +
    deletedRows.map(function(r){
      return '<div style="background:#fee2e2;border-radius:10px;padding:10px 14px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;opacity:.6">' +
        '<div><div style="font-size:13px;font-weight:700;color:#991b1b">'+esc(r.o.itemName)+'</div>' +
        '<div style="font-size:11px;color:#aaa">'+esc(r.o.custCode+' '+(getShortName(r.o.custCode)||r.o.custName))+'</div></div>' +
        '<button class="btn-restore" onclick="restoreRow(\''+r.key+'\','+r.isAdded+')">↩</button>' +
        '</div>';
    }).join('') + '</div>';

  el.innerHTML = groupOrder.map(function(k){
    var g = groups[k];
    var rowsHtml = g.rows.map(function(r){
      var bInfo    = getBatchInfo(r.o);
      var batchCls = bInfo ? ' is-new-'+bInfo.b : '';
      var timeBadge= bInfo ? '<span class="new-time">'+bInfo.t+'</span>' : '';
      var shortName= getShortName(r.o.custCode);
      var editedMark = adminEdits[r.key] && !r.isAdded ? '<span style="font-size:10px;color:var(--sky)"> ✎</span>' : '';
      return [
        '<div class="store-row'+batchCls+'" style="cursor:pointer" onclick="openAdminEdit(\''+r.key+'\','+r.isAdded+')">',
        '  <div class="store-code-block">',
        '    <div class="store-code">'+esc(r.o.custCode)+editedMark+'</div>',
        '    <div class="store-name-short">'+esc(shortName||r.o.custName)+'</div>',
        timeBadge,
        '  </div>',
        '  <div style="display:flex;align-items:center;gap:10px;flex-shrink:0">',
        '    <div style="text-align:right">',
        '      <div class="store-qty">'+fmtQty(r.qty)+'</div>',
        '      <div class="store-unit">'+esc(r.unit)+'</div>',
        '    </div>',
        '    <div style="font-size:18px;color:#cbd5e1">›</div>',
        '  </div>',
        '</div>'
      ].join('');
    }).join('');
    return [
      '<div class="product-card">',
      '  <div class="product-card-header">',
      '    <div class="product-name">'+esc(g.label)+'</div>',
      '  </div>',
      rowsHtml,
      '</div>'
    ].join('');
  }).join('') + deletedHtml;
}

function openAdminEdit(key, isAdded) {
  adminEdits = JSON.parse(store('get','admin_edits_'+todayKey()) || '{}');
  adminAdded = JSON.parse(store('get','admin_added_'+todayKey()) || '[]');

  var r;
  if (isAdded) {
    var idx = parseInt(key.replace('added_',''));
    var a = adminAdded[idx];
    r = { key:key, isAdded:true, itemName:a.itemName, custName:a.custName,
          qty:a.qty, unit:a.unit, comment:a.comment };
  } else {
    var parts = key.split('_');
    var i = parseInt(parts[parts.length-3]); // rough parse
    // Find by key
    for (var j=0;j<todayOrders.length;j++){
      if (orderKey(j, todayOrders[j]) === key) {
        var o = todayOrders[j];
        var edit = adminEdits[key] || {};
        r = { key:key, isAdded:false,
              itemName:o.itemName, custName:(getShortName(o.custCode)||o.custName),
              qty:   edit.qty     !== undefined ? edit.qty     : o.qty,
              unit:  edit.unit    !== undefined ? edit.unit    : o.unit,
              comment:edit.comment!== undefined ? edit.comment : (o.comment||'') };
        break;
      }
    }
  }
  if (!r) return;
  adminEditTarget = { key:key, isAdded:isAdded };
  document.getElementById('aedit-label').textContent = r.itemName + ' / ' + r.custName;
  document.getElementById('aedit-qty').value  = fmtQty(r.qty);
  document.getElementById('aedit-unit').value = r.unit;
  document.getElementById('aedit-cmt').value  = r.comment || '';
  document.getElementById('admin-edit-modal').classList.add('show');
}

function closeAdminEdit() { document.getElementById('admin-edit-modal').classList.remove('show'); }

function saveAdminEditModal() {
  if (!adminEditTarget) return;
  var key = adminEditTarget.key; var isAdded = adminEditTarget.isAdded;
  var qty = document.getElementById('aedit-qty').value;
  var unit= document.getElementById('aedit-unit').value;
  var cmt = document.getElementById('aedit-cmt').value;
  if (isAdded) {
    var idx = parseInt(key.replace('added_',''));
    adminAdded[idx].qty=qty; adminAdded[idx].unit=unit; adminAdded[idx].comment=cmt;
    store('set','admin_added_'+todayKey(), JSON.stringify(adminAdded));
  } else {
    adminEdits = JSON.parse(store('get','admin_edits_'+todayKey()) || '{}');
    if (!adminEdits[key]) adminEdits[key]={};
    adminEdits[key].qty=qty; adminEdits[key].unit=unit; adminEdits[key].comment=cmt;
    store('set','admin_edits_'+todayKey(), JSON.stringify(adminEdits));
  }
  closeAdminEdit();
  renderAdminList();
  showToast('保存しました ✓','success');
}

function deleteRowModal() {
  if (!adminEditTarget) return;
  var key = adminEditTarget.key; var isAdded = adminEditTarget.isAdded;

  // Mark in GAS (shared) — find fingerprint of this order
  if (!isAdded) {
    for (var j=0;j<todayOrders.length;j++){
      if (orderKey(j, todayOrders[j]) === key) {
        var fp = orderFingerprint(todayOrders[j]);
        var dateStr = todayKey().replace('snap_','');
        fetch(gasUrl + '?action=markDeleted&fp=' + encodeURIComponent(fp) + '&date=' + encodeURIComponent(dateStr))
          .catch(function(){});
        // Also update local cache immediately
        var d = getGasDeleted(); d[fp]=true;
        store('set','gas_deleted_'+todayKey(), JSON.stringify(d));
        break;
      }
    }
  }

  adminEdits = JSON.parse(store('get','admin_edits_'+todayKey()) || '{}');
  if (isAdded) {
    adminAdded[parseInt(key.replace('added_',''))].deleted=true;
    store('set','admin_added_'+todayKey(), JSON.stringify(adminAdded));
  } else {
    if (!adminEdits[key]) adminEdits[key]={};
    adminEdits[key].deleted=true;
    store('set','admin_edits_'+todayKey(), JSON.stringify(adminEdits));
  }
  closeAdminEdit();
  renderAdminList();
  showToast('削除しました');
}

function restoreRow(key, isAdded) {
  adminEdits = JSON.parse(store('get','admin_edits_'+todayKey()) || '{}');
  if (isAdded) {
    adminAdded[parseInt(key.replace('added_',''))].deleted=false;
    store('set','admin_added_'+todayKey(), JSON.stringify(adminAdded));
  } else {
    if (adminEdits[key]) adminEdits[key].deleted=false;
    store('set','admin_edits_'+todayKey(), JSON.stringify(adminEdits));
  }
  renderAdminList();
  showToast('復元しました','success');
}

function addAdminRow() {
  var code = currentGroup==='all' ? '' : String(currentGroup);
  adminAdded.push({ custCode:'', custName:'', itemCode:code, itemName:'新規', qty:0, unit:'', comment:'', deleted:false });
  store('set','admin_added_'+todayKey(), JSON.stringify(adminAdded));
  renderAdminList();
  showToast('行を追加しました','warn');
}

// ══════════════════════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════════════════════
function orderKey(i, o) {
  return todayKey() + '_' + loginCode + '_' + i + '_' + o.custCode + '_' + o.itemCode;
}

function pad(n){ return String(n).padStart(2,'0'); }

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function store(op, key, val) {
  try {
    if (op==='get') return localStorage.getItem(key);
    if (op==='set') { localStorage.setItem(key, val); return; }
    if (op==='del') { localStorage.removeItem(key); return; }
  } catch(e){ return null; }
}

function showLoading(t){ document.getElementById('loading-text').textContent=t||'Loading...'; document.getElementById('loading').classList.add('show'); }
function hideLoading(){  document.getElementById('loading').classList.remove('show'); }

function showToast(msg, type) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className   = 'show' + (type ? ' '+type : '');
  clearTimeout(t._t);
  t._t = setTimeout(function(){ t.className=''; }, 2800);
}
</script>
