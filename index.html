<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>注文確認システム</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --navy:#0f2744;--navy2:#1a3a5c;--navy3:#1e4d7b;
  --sky:#0ea5e9;--sky-light:#e0f2fe;
  --green:#16a34a;--green-light:#dcfce7;
  --amber:#f59e0b;--amber-light:#fffbeb;--amber-border:#fde68a;
  --red:#dc2626;--red-light:#fee2e2;
  --gray:#64748b;--gray-light:#f1f5f9;
  --border:#e2e8f0;--white:#ffffff;
  --shadow:0 4px 24px rgba(15,39,68,0.10);
  --shadow-sm:0 2px 8px rgba(15,39,68,0.07);
}
body{font-family:-apple-system,'Hiragino Sans','Yu Gothic UI','Meiryo',sans-serif;background:#f0f4f8;color:#1a1a2e;min-height:100vh}

/* ══════════════════════════════════════════
   SETUP SCREEN
══════════════════════════════════════════ */
#setup-screen{
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:24px 16px;
  background:linear-gradient(160deg,#0f2744 0%,#1e4d7b 55%,#1a3a5c 100%);
}
.setup-logo{text-align:center;margin-bottom:32px}
.setup-logo .icon{font-size:52px;margin-bottom:14px;display:block}
.setup-logo h1{color:#fff;font-size:22px;font-weight:900;letter-spacing:1.5px}
.setup-logo p{color:rgba(255,255,255,0.4);font-size:12px;margin-top:5px}

.setup-card{
  background:white;border-radius:22px;padding:30px 24px;
  width:100%;max-width:420px;
  box-shadow:0 24px 80px rgba(0,0,0,0.35);
}
.setup-card h2{font-size:15px;font-weight:700;color:var(--navy);margin-bottom:24px;
  padding-bottom:14px;border-bottom:2px solid var(--gray-light)}

.form-group{margin-bottom:18px}
.form-group label{
  display:block;font-size:10px;color:var(--gray);font-weight:700;
  margin-bottom:7px;letter-spacing:0.8px;text-transform:uppercase
}
.form-group input{
  width:100%;padding:13px 15px;
  border:2px solid var(--border);border-radius:12px;
  font-size:15px;font-family:inherit;color:var(--navy);
  transition:all .2s;background:var(--gray-light)
}
.form-group input:focus{
  outline:none;border-color:var(--sky);background:white;
  box-shadow:0 0 0 4px rgba(14,165,233,0.12)
}
.hint{font-size:11px;color:#aaa;margin-top:6px}

.btn-login{
  width:100%;padding:16px;
  background:linear-gradient(135deg,#0f2744,#1e4d7b);
  color:white;border:none;border-radius:13px;
  font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;
  letter-spacing:0.5px;margin-top:6px;
  transition:transform .1s,opacity .15s;
  box-shadow:0 4px 16px rgba(15,39,68,0.3)
}
.btn-login:active{transform:scale(.98);opacity:.9}

/* ══════════════════════════════════════════
   APP SCREEN
══════════════════════════════════════════ */
#app-screen{display:none;flex-direction:column;min-height:100vh}

.app-header{
  background:linear-gradient(135deg,#0f2744 0%,#1a3a5c 100%);
  color:white;padding:14px 16px 12px;
  position:sticky;top:0;z-index:200;
  box-shadow:0 2px 20px rgba(15,39,68,0.45);
  display:flex;align-items:center;gap:10px
}
.header-back{
  background:rgba(255,255,255,0.12);border:none;color:white;
  border-radius:8px;padding:8px 11px;font-size:14px;
  cursor:pointer;font-family:inherit;flex-shrink:0
}
.header-info{flex:1;min-width:0}
.header-title{font-size:16px;font-weight:900;letter-spacing:.3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.header-sub{font-size:10px;opacity:.5;margin-top:2px}
.btn-reload{
  background:rgba(255,255,255,0.12);border:1.5px solid rgba(255,255,255,0.22);
  color:white;border-radius:8px;padding:8px 13px;
  font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;
  white-space:nowrap;transition:background .15s
}
.btn-reload:active{background:rgba(255,255,255,0.25)}
.btn-reload.spinning{opacity:.6;pointer-events:none}

/* Tab bar */
.tab-bar{
  background:white;border-bottom:2px solid var(--border);
  display:flex;position:sticky;top:57px;z-index:199;
  box-shadow:0 2px 8px rgba(0,0,0,0.04)
}
.tab-item{
  flex:1;padding:14px 8px;border:none;background:none;
  font-family:inherit;font-size:13px;font-weight:700;color:#bbb;
  border-bottom:3px solid transparent;margin-bottom:-2px;
  cursor:pointer;transition:all .2s;position:relative
}
.tab-item.active{color:var(--navy);border-bottom-color:var(--navy)}
.tab-badge{
  position:absolute;top:8px;right:12px;
  background:var(--amber);color:white;
  font-size:10px;font-weight:900;padding:2px 6px;
  border-radius:20px;min-width:18px;text-align:center
}

/* Content */
.content{padding:14px;flex:1;max-width:600px;margin:0 auto;width:100%}

/* ── NEW ORDER BANNER ── */
.new-banner{
  background:linear-gradient(135deg,var(--amber),#d97706);
  color:white;border-radius:13px;padding:13px 16px;
  margin-bottom:12px;display:flex;align-items:center;gap:10px;
  box-shadow:0 4px 16px rgba(245,158,11,0.35);
  animation:slideDown .3s ease
}
@keyframes slideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.new-banner .nb-icon{font-size:22px;flex-shrink:0}
.new-banner .nb-text strong{display:block;font-size:14px;font-weight:900}
.new-banner .nb-text span{font-size:11px;opacity:.85}
.new-banner .nb-close{
  margin-left:auto;background:rgba(255,255,255,0.25);
  border:none;color:white;border-radius:6px;
  padding:4px 9px;font-size:12px;cursor:pointer;font-family:inherit
}

/* ── SYNC BAR ── */
.sync-bar{
  background:white;border-radius:11px;padding:10px 14px;
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:12px;border:1px solid var(--border);
  box-shadow:var(--shadow-sm)
}
.sync-count{font-size:13px;font-weight:700;color:var(--navy)}
.sync-time{font-size:11px;color:var(--gray)}

/* ── COMMENT PANEL ── */
.comment-panel{
  background:white;border-radius:13px;border:2px solid var(--amber-border);
  margin-bottom:12px;overflow:hidden;box-shadow:var(--shadow-sm)
}
.comment-panel-header{
  padding:12px 16px;display:flex;align-items:center;gap:10px;
  cursor:pointer;user-select:none
}
.comment-panel-header:active{background:var(--amber-light)}
.cp-icon{font-size:16px}
.cp-title{font-size:13px;font-weight:700;color:#92400e;flex:1}
.cp-arrow{font-size:12px;color:#b45309;transition:transform .2s}
.cp-arrow.open{transform:rotate(180deg)}
.comment-panel-body{display:none;border-top:1px solid var(--amber-border)}
.comment-panel-body.open{display:block}
.cp-row{
  padding:11px 16px;border-bottom:1px solid #fef3c7;
  display:flex;flex-direction:column;gap:3px
}
.cp-row:last-child{border-bottom:none}
.cp-store{font-size:11px;font-weight:700;color:#92400e}
.cp-text{font-size:13px;color:#78350f}

/* ── ADMIN COMMENT BANNER ── */
.admin-comment-banner{
  background:linear-gradient(135deg,#7f1d1d,#991b1b);
  border-radius:14px;padding:16px 18px;margin-bottom:14px;
  box-shadow:0 4px 20px rgba(127,29,29,0.35);
  animation:slideDown .3s ease;position:relative
}
.acb-label{
  display:flex;align-items:center;gap:7px;
  font-size:11px;font-weight:900;color:rgba(255,255,255,0.7);
  letter-spacing:1px;margin-bottom:8px
}
.acb-pulse{
  width:8px;height:8px;border-radius:50%;background:#fca5a5;
  animation:pulse 1.2s infinite
}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.3)}}
.acb-text{
  font-size:15px;font-weight:700;color:white;line-height:1.5;
  white-space:pre-wrap
}
.acb-time{font-size:10px;color:rgba(255,255,255,0.45);margin-top:8px}
.acb-edit{
  position:absolute;top:12px;right:12px;
  background:rgba(255,255,255,0.15);border:none;color:white;
  border-radius:7px;padding:5px 10px;font-size:11px;font-weight:700;
  font-family:inherit;cursor:pointer
}
/* Partner-facing comment banner states */
.cmt-strip{
  border-radius:10px;padding:10px 14px;margin-bottom:12px;
  display:flex;align-items:center;gap:10px;cursor:pointer;
  transition:all .2s;user-select:none
}
.cmt-strip.unread{background:#fff1f1;border:1.5px solid #fca5a5}
.cmt-strip.read{background:#f0fdf4;border:1.5px solid #86efac}
.cmt-strip-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;animation:pulse 1.2s infinite}
.cmt-strip.unread .cmt-strip-dot{background:#ef4444}
.cmt-strip.read .cmt-strip-dot{background:#22c55e;animation:none}
.cmt-strip-label{font-size:12px;font-weight:700;flex:1}
.cmt-strip.unread .cmt-strip-label{color:#991b1b}
.cmt-strip.read .cmt-strip-label{color:#166534}
.cmt-strip-arrow{font-size:11px;color:#aaa;transition:transform .2s}
.cmt-strip-arrow.open{transform:rotate(180deg)}
.cmt-expanded{
  background:#fff1f1;border:1.5px solid #fca5a5;border-top:none;
  border-radius:0 0 10px 10px;padding:14px 16px;margin-top:-12px;margin-bottom:12px
}
.cmt-expanded-text{
  font-size:14px;color:#7f1d1d;font-weight:600;
  line-height:1.6;white-space:pre-wrap;margin-bottom:14px
}
.btn-cmt-read{
  width:100%;padding:11px;background:var(--green);color:white;
  border:none;border-radius:9px;font-size:13px;font-weight:700;
  font-family:inherit;cursor:pointer
}
.product-card{
  background:white;border-radius:16px;
  border:2px solid var(--border);margin-bottom:12px;
  overflow:hidden;box-shadow:var(--shadow-sm);
  transition:border-color .2s
}
.product-card.is-new{border-color:var(--amber);background:var(--amber-light)}
.product-card-header{
  padding:14px 16px 10px;
  border-bottom:1px solid var(--border);
  background:var(--gray-light)
}
.product-name{font-size:19px;font-weight:900;color:var(--navy);line-height:1.2}
.product-new-pill{
  display:inline-block;background:var(--amber);color:white;
  font-size:9px;font-weight:900;padding:2px 7px;
  border-radius:20px;letter-spacing:.5px;margin-bottom:4px
}
.store-row{
  padding:14px 16px;border-bottom:1px solid #f1f5f9;
  display:grid;grid-template-columns:70px 1fr auto;
  align-items:center;gap:0
}
.store-row:last-child{border-bottom:none}
/* Batch colors — subtle, 3 levels */
.store-row.is-new-1{background:#fffbeb;border-left:3px solid #f59e0b}
.store-row.is-new-2{background:#f0f9ff;border-left:3px solid #0ea5e9}
.store-row.is-new-3{background:#f5f3ff;border-left:3px solid #8b5cf6}
.new-time{font-size:10px;color:#94a3b8;display:block;margin-top:2px}
.store-code-block{
  display:flex;flex-direction:column;align-items:center;gap:1px;
  padding-right:14px;border-right:2px solid #e8eef6;
  text-align:center
}
.store-code{font-size:24px;font-weight:900;color:var(--navy);line-height:1}
.store-name-short{font-size:11px;color:#94a3b8;font-weight:500}
.store-variant{font-size:10px;color:#b0bac4;margin-top:1px}
.store-mid{
  padding:0 14px;font-size:12px;color:#64748b;
  text-align:center
}
.store-qty-block{
  text-align:center;padding-left:14px;border-left:2px solid #e8eef6;
  display:flex;flex-direction:column;align-items:center
}
.store-qty{font-size:24px;font-weight:900;color:var(--navy)}
.store-unit{font-size:12px;color:var(--gray)}

/* ── EMPTY STATE ── */
.empty{text-align:center;padding:60px 20px;color:var(--gray)}
.empty .eicon{font-size:48px;margin-bottom:14px}
.empty p{font-size:14px}

/* ══════════════════════════════════════════
   ADMIN VIEW
══════════════════════════════════════════ */
.admin-notice{
  font-size:11px;color:#92400e;
  background:#fef3c7;border:1px solid #fde68a;
  border-radius:9px;padding:10px 14px;
  margin-bottom:14px;text-align:center
}
.admin-groups{
  display:flex;overflow-x:auto;scrollbar-width:none;
  gap:7px;padding-bottom:12px
}
.admin-groups::-webkit-scrollbar{display:none}
.agroup-btn{
  white-space:nowrap;padding:8px 15px;
  background:white;border:2px solid var(--border);
  border-radius:20px;font-size:12px;font-weight:700;
  color:var(--gray);cursor:pointer;transition:all .15s;font-family:inherit
}
.agroup-btn.active{background:var(--navy);color:white;border-color:var(--navy)}

.admin-group-bar{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:12px
}
.admin-group-label{font-size:15px;font-weight:900;color:var(--navy)}
.btn-add{
  padding:8px 15px;background:var(--sky);color:white;
  border:none;border-radius:9px;font-size:12px;font-weight:700;
  font-family:inherit;cursor:pointer
}

.admin-card{
  background:white;border-radius:14px;border:1.5px solid var(--border);
  margin-bottom:9px;overflow:hidden;box-shadow:var(--shadow-sm);transition:all .2s
}
.admin-card.is-new{border-color:var(--amber);background:var(--amber-light)}
.admin-card.deleted{opacity:.4;border-color:#fca5a5;background:var(--red-light)}
.acard-body{padding:13px 14px}
.acard-store{font-size:11px;color:var(--sky);font-weight:700;margin-bottom:5px;display:flex;align-items:center;gap:5px}
.acard-item{font-size:15px;font-weight:700;color:var(--navy);margin-bottom:10px}
.acard-fields{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:9px}
.acard-field label{font-size:10px;color:var(--gray);font-weight:700;display:block;margin-bottom:5px;letter-spacing:.3px}
.acard-field input,.acard-cmt input{
  width:100%;padding:9px 11px;border:1.5px solid var(--border);
  border-radius:9px;font-size:14px;font-family:inherit;color:var(--navy);
  transition:border-color .2s;background:var(--gray-light)
}
.acard-field input:focus,.acard-cmt input:focus{
  outline:none;border-color:var(--sky);background:white
}
.acard-cmt{margin-bottom:0}
.acard-cmt label{font-size:10px;color:var(--gray);font-weight:700;display:block;margin-bottom:5px}
.acard-footer{
  border-top:1px solid var(--border);padding:9px 14px;
  display:flex;gap:8px;justify-content:flex-end
}
.btn-save{
  padding:8px 18px;background:var(--green);color:white;
  border:none;border-radius:8px;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer
}
.btn-del{
  padding:8px 14px;background:var(--red-light);color:var(--red);
  border:1px solid #fca5a5;border-radius:8px;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer
}
.btn-restore{
  padding:8px 14px;background:var(--sky-light);color:#0369a1;
  border:1px solid #bae6fd;border-radius:8px;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer
}

/* ══════════════════════════════════════════
   NOTE MODAL
══════════════════════════════════════════ */
.modal-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,0.5);z-index:998;
  align-items:flex-end;backdrop-filter:blur(4px)
}
.modal-overlay.show{display:flex}
.modal-box{
  background:white;width:100%;border-radius:22px 22px 0 0;
  padding:24px 18px 44px;
}
.modal-handle{width:40px;height:4px;background:#ddd;border-radius:2px;margin:0 auto 20px}
.modal-box h3{font-size:16px;font-weight:900;color:var(--navy);margin-bottom:5px}
.modal-box p{font-size:12px;color:var(--gray);margin-bottom:16px}
.modal-box textarea{
  width:100%;padding:13px 15px;border:2px solid var(--border);
  border-radius:13px;font-size:14px;font-family:inherit;
  resize:none;height:100px;color:var(--navy);
  transition:border-color .2s;background:var(--gray-light)
}
.modal-box textarea:focus{outline:none;border-color:var(--sky);background:white}
.modal-btns{display:flex;gap:10px;margin-top:12px}
.modal-cancel{
  flex:1;padding:14px;background:var(--gray-light);color:var(--navy);
  border:1.5px solid var(--border);border-radius:11px;
  font-size:14px;font-weight:700;font-family:inherit;cursor:pointer
}
.modal-save{
  flex:2;padding:14px;background:var(--navy);color:white;
  border:none;border-radius:11px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer
}

/* ══════════════════════════════════════════
   LOADING & TOAST
══════════════════════════════════════════ */
#loading{
  display:none;position:fixed;inset:0;
  background:rgba(15,39,68,0.45);backdrop-filter:blur(4px);
  align-items:center;justify-content:center;z-index:999
}
#loading.show{display:flex}
.loading-box{
  background:white;border-radius:20px;padding:32px 44px;
  text-align:center;box-shadow:0 24px 60px rgba(0,0,0,0.22)
}
.spinner{
  width:38px;height:38px;border:3.5px solid #e2e8f0;
  border-top-color:var(--navy);border-radius:50%;
  animation:spin .75s linear infinite;margin:0 auto 16px
}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-box p{font-size:13px;color:var(--gray);font-weight:600}

#toast{
  position:fixed;bottom:28px;left:50%;
  transform:translateX(-50%) translateY(10px);
  background:var(--navy);color:white;
  padding:11px 24px;border-radius:24px;
  font-size:13px;font-weight:700;opacity:0;
  transition:all .25s;z-index:1000;
  white-space:nowrap;pointer-events:none;
  box-shadow:0 6px 24px rgba(15,39,68,0.4)
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.success{background:var(--green)}
#toast.warn{background:var(--amber)}
#toast.error{background:var(--red)}

.store-row.is-cancelled{
  opacity:.55;
  border-left:3px solid var(--red);
  padding-left:13px;
  background:#fff5f5
}
.cancelled-msg{
  font-size:11px;color:var(--red);margin-top:3px;
  font-style:italic
}
.store-qty.cancelled{text-decoration:line-through;color:#aaa}
.stock-adj{
  font-size:11px;color:var(--red);margin-top:3px;font-weight:700
}
/* ══════════════════════════════════════════════════════════════
   仕入入力 TAB
══════════════════════════════════════════════════════════════ */
.s-fish-card{background:white;border-radius:14px;border:1.5px solid var(--border);margin-bottom:10px;overflow:hidden;box-shadow:var(--shadow-sm)}
.s-fish-card.has-filled{border-color:#81c784}
.s-fish-header{display:flex;justify-content:space-between;align-items:center;padding:15px 16px;cursor:pointer;user-select:none}
.s-fish-header:active{background:var(--gray-light)}
.s-fish-name{font-size:16px;font-weight:700;color:var(--navy)}
.s-fish-summary{font-size:12px;color:var(--gray);margin-top:3px}
.s-fish-arrow{font-size:11px;color:#ccc;transition:transform .2s}
.s-fish-arrow.open{transform:rotate(180deg);color:var(--navy)}
.s-fish-body{display:none;border-top:1.5px solid #f4f6f9}
.s-fish-body.open{display:block}
.s-store-list{padding:10px 12px;display:flex;flex-direction:column;gap:8px}
.s-store-row{background:#fafbfd;border:1.5px solid var(--border);border-radius:12px;overflow:hidden;transition:border-color .2s}
.s-store-row.filled{border-color:#a5d6a7;background:#f9fdf9}
.s-store-header{display:flex;justify-content:space-between;align-items:center;padding:11px 14px;cursor:pointer;user-select:none}
.s-store-header:active{background:#f0f4fa}
.s-store-name-text{font-size:14px;font-weight:700;color:var(--navy)}
.s-store-badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px}
.badge-empty{background:#f0f0f0;color:#bbb}
.badge-filled{background:#e8f5e9;color:#2e7d32}
.s-input-area{display:none;border-top:1px solid var(--border);padding:14px;background:white}
.s-input-area.open{display:block}
.s-input-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px}
.s-field{display:flex;flex-direction:column;gap:5px}
.s-field label{font-size:10px;color:#aaa;font-weight:700;letter-spacing:.3px;text-transform:uppercase}
.s-field input{padding:10px;border:1.5px solid var(--border);border-radius:10px;font-size:18px;font-family:inherit;width:100%;text-align:right;font-weight:600;color:var(--navy);background:#fafbfd;transition:border-color .2s}

<script>
// ══════════════════════════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════════════════════════

  8:'萬漁箱', 9:'せんせんせん', 10:'一承', 11:'山尾天神',
  12:'山尾博多', 13:'山尾西新', 14:'魚屋', 15:'藤う那天神',
  16:'一承東京', 17:'フタクチ', 18:'野が海', 20:'又', 21:'飛うお', 22:'とりとりと', 30:'藤う那博多'
};

// 商品名のバリアント統合（このキーワードを含む商品は1グループに）
var VARIANT_GROUPS = [
  'アナゴ',
  'カツオ',
  'イサキ'
];

var ADMIN_CODE   = '999';

// ══════════════════════════════════════════════════════════════
// ★ Admin: URLをここに貼り付けてください（変更時はこの1行だけ）
// ══════════════════════════════════════════════════════════════
var DEFAULT_GAS_URL = 'https://script.google.com/macros/s/AKfycbyYMX11UjruGgm3NJw9cJmPQ02n3vZOhAkX_WyCV7Uhsv65RbOAHGmvQH51PgxpIH8/exec';

// ══════════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════════
var gasUrl = DEFAULT_GAS_URL || store('get','gas_url');
var loginCode    = '';
var isAdmin      = false;
var todayOrders  = [];
var newOrderKeys = {};
var adminEdits   = {};
var adminAdded   = [];
var currentGroup = 'all';
var noteTargetKey= '';
var noteTargetIdx= -1;
var groupComments= {}; // { code: { text, time } }
var stockAdjusted= {}; // { fingerprint: { from, to } } — 在庫調整された注文

// ══════════════════════════════════════════════════════════════
// 仕入入力 CONSTANTS
// ══════════════════════════════════════════════════════════════
var SHIIRE_GAS_URL  = 'https://script.google.com/macros/s/AKfycbyYMX11UjruGgm3NJw9cJmPQ02n3vZOhAkX_WyCV7Uhsv65RbOAHGmvQH51PgxpIH8/exec';
var SHIIRE_SHEET_ID = '1mXrNddkibkMpUBcof-vhPNTzahO3Y456Ejh6obNU9zw';
var CODE_TO_PREFIX  = {
  100:'市）',
  101:'丸）',102:'中）',103:'え）',104:'貴）',
  105:'若）',106:'立）',107:'梅）',108:'フ）',
  109:'食）',111:'板）'
};
var SHIIRE_GROUPED  = ['アナゴ','カツオ','イサキ'];
var shiireData      = {};
var shiireSheet     = '';
var shiireLoaded    = false;
var shiireTimers    = {};

// ══════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════
(function init() {
  var code = store('get','gas_code') || '';
  if (code) {
    document.getElementById('login-code').value = code;
    doLogin();
  }
})();

// ══════════════════════════════════════════════════════════════
// LOGIN / LOGOUT
// ══════════════════════════════════════════════════════════════
function doLogin() {
  var code = document.getElementById('login-code').value.trim();
  if (!code) { showToast('コードを入力してください','error'); return; }
  store('set','gas_code', code);
  loginCode = code;
  isAdmin   = (code === ADMIN_CODE);
  if (isAdmin) document.getElementById('btn-url-settings').style.display = 'block';
  loadData();
}

function doLogout() {
  document.getElementById('setup-screen').style.display  = 'flex';
  document.getElementById('app-screen').style.display    = 'none';
  document.getElementById('partner-view').style.display  = 'none';
  document.getElementById('admin-view').style.display    = 'none';
  document.getElementById('btn-url-settings').style.display = 'none';
}

// ── URL Settings (admin only) ──
function openUrlSettings() {
  document.getElementById('url-modal-input').value = gasUrl;
  document.getElementById('url-modal').classList.add('show');
}
function closeUrlSettings() { document.getElementById('url-modal').classList.remove('show'); }
function saveUrlSettings() {
  var newUrl = document.getElementById('url-modal-input').value.trim();
  if (!newUrl) return;
  gasUrl = newUrl;
  store('set','gas_url', gasUrl);
  closeUrlSettings();
  loadData();
  showToast('URL更新しました','success');
}

// ══════════════════════════════════════════════════════════════
// FETCH DATA
// ══════════════════════════════════════════════════════════════
var adminOrdersLoaded = false;

function onReloadClick() {
  if (isAdmin) {
    // 管理者：開いているタブだけ更新
    if (adminCurrentTab === 'shiire') {
      reloadShiire();
    } else {
      loadOrdersData();
    }
  } else {
    loadOrdersData();
  }
}

function loadData() {
  // 管理者(999)は注文データを即取得せず、まず仕入入力タブを表示（遅延読込）
  if (isAdmin) {
    document.getElementById('setup-screen').style.display = 'none';
    document.getElementById('app-screen').style.display   = 'flex';
    document.getElementById('header-title').textContent   = '管理者画面';
    document.getElementById('header-sub').textContent     = getDateStr();
    document.getElementById('partner-view').style.display = 'none';
    document.getElementById('admin-view').style.display   = 'flex';
    // 仕入入力タブを先頭に表示
    switchAdminMainTab('shiire');
    return;
  }
  loadOrdersData();
}

// 注文確認データの取得（partner は即時、admin はタブ初回タップ時）
function loadOrdersData() {
  var reloadBtn = document.getElementById('btn-reload');
  reloadBtn.classList.add('spinning');
  showLoading('データを取得中...');

  var code    = isAdmin ? 'all' : loginCode;
  var dateStr = todayKey().replace('snap_','');
  var ordersUrl   = gasUrl + '?action=getOrders&code='        + encodeURIComponent(code);
  var deletedUrl  = gasUrl + '?action=getDeleted&date='       + encodeURIComponent(dateStr);
  var commentsUrl = gasUrl + '?action=getGroupComments&date=' + encodeURIComponent(dateStr);

  Promise.all([
    fetch(ordersUrl).then(function(r){ return r.json(); }),
    fetch(deletedUrl).then(function(r){ return r.json(); }).catch(function(){ return { deleted:[] }; }),
    fetch(commentsUrl).then(function(r){ return r.json(); }).catch(function(){ return { comments:{} }; })
  ])
  .then(function(results){
    hideLoading();
    reloadBtn.classList.remove('spinning');
    var json     = results[0];
    var delJson  = results[1];
    var cmtJson  = results[2];
    if (!json.success) { showToast(json.error || 'エラーが発生しました','error'); return; }

    groupComments = cmtJson.comments || {};

    // Store deleted fingerprints (from GAS, shared across all devices)
    var deletedFps = {};
    (delJson.deleted || []).forEach(function(fp){ deletedFps[fp] = true; });
    store('set','gas_deleted_'+todayKey(), JSON.stringify(deletedFps));

    var freshOrders = json.orders || [];
    detectNewOrders(freshOrders, json.syncDate || '');
    todayOrders = freshOrders;
    saveSnapshot(freshOrders);

    document.getElementById('setup-screen').style.display = 'none';
    document.getElementById('app-screen').style.display   = 'flex';

    var syncDateStr = json.syncDate || '';
    // 在庫がある注文を自動キャンセル → 完了後に描画
    autoCancelByStock().then(function(){
      if (isAdmin) {
        adminOrdersLoaded = true;
        renderAdmin(syncDateStr);
      } else {
        renderPartner(syncDateStr);
      }
    });
  })
  .catch(function(e){
    hideLoading();
    reloadBtn.classList.remove('spinning');
    showToast('通信エラー: ' + e.message,'error');
  });
}

function getGasDeleted() {
  return JSON.parse(store('get','gas_deleted_'+todayKey()) || '{}');
}

// ══════════════════════════════════════════════════════════════
// 在庫による自動キャンセル / 数量調整
// 在庫管理（A列=商品名, B列=残数）を読み、商品名が完全一致する注文を
// custCode 昇順で在庫を引き当てていく：
//   ・在庫 ≥ 注文数量 → その注文をキャンセル（markDeleted）、在庫を減らす
//   ・在庫 < 注文数量 だが在庫 > 0 → 注文数量を（注文数量−在庫）に減らして表示
//     （アプリ表示のみ。元シートには書き込まない）
//   ・在庫 = 0 → 以降の注文はそのまま
// ══════════════════════════════════════════════════════════════
function autoCancelByStock() {
  return fetch(gasUrl + '?action=getStock')
    .then(function(r){ return r.json(); })
    .then(function(js){
      if (!js || !js.success || !js.stock) return;

      // 商品名 → 在庫数（完全一致）
      var stockMap = {};
      js.stock.forEach(function(s){
        var nm = String(s.name || '').trim();
        if (nm) stockMap[nm] = parseFloat(s.qty) || 0;
      });

      // 在庫がある商品名ごとに、対象注文を custCode 昇順で集める
      var byName = {};
      todayOrders.forEach(function(o, i){
        var nm = String(o.itemName || '').trim();
        if (!(nm in stockMap)) return;
        if (!byName[nm]) byName[nm] = [];
        byName[nm].push({ o: o, i: i });
      });

      var deleted = getGasDeleted();
      var ds = todayKey().replace('snap_','');
      var pending = [];
      var changed = false;
      stockAdjusted = {};  // 数量調整された注文（fingerprint → {from,to}）をリセット

      Object.keys(byName).forEach(function(nm){
        var remain = stockMap[nm];
        var list = byName[nm].sort(function(a, b){
          return (parseFloat(a.o.custCode) || 0) - (parseFloat(b.o.custCode) || 0);
        });
        list.forEach(function(entry){
          var o = entry.o;
          if (remain <= 0) return;                       // 在庫切れ → そのまま
          var orderQty = parseFloat(o.qty) || 0;
          if (orderQty <= 0) return;
          if (remain >= orderQty) {
            // 全量在庫あり → キャンセル
            remain -= orderQty;
            var fp = orderFingerprint(o);                // 元の数量で fingerprint
            if (!deleted[fp]) {
              deleted[fp] = true;
              changed = true;
              pending.push(
                fetch(gasUrl + '?action=markDeleted&fp=' + encodeURIComponent(fp) + '&date=' + encodeURIComponent(ds))
                  .catch(function(){})
              );
            }
          } else {
            // 一部だけ在庫あり → 注文数量を不足分に減らす（表示のみ）
            var origQty = orderQty;
            o.qty = orderQty - remain;
            stockAdjusted[orderFingerprint(o)] = { from: origQty, to: o.qty };
            remain = 0;
          }
        });
      });

      if (changed) store('set','gas_deleted_'+todayKey(), JSON.stringify(deleted));
      return Promise.all(pending);
    })
    .catch(function(){ /* 在庫取得失敗時は何もしない（通常通り表示） */ });
}

// ══════════════════════════════════════════════════════════════
// NEW ORDER DETECTION
// ══════════════════════════════════════════════════════════════
function orderFingerprint(o) {
  return [o.custCode, o.itemCode, o.itemName, o.qty, o.unit].join('|');
}

function detectNewOrders(freshOrders, syncDate) {
  newOrderKeys = {};
  var syncKey    = 'last_sync_' + loginCode;
  var storedSync = store('get', syncKey) || '';

  // syncDateが同じ → Scriptは動いていない → 何もしない
  if (syncDate && storedSync === syncDate) return;

  // 前回snapshotなし → 初回ロード → 比較なし、syncDateだけ更新
  var prevRaw = store('get', todayKey());
  if (!prevRaw) {
    if (syncDate) store('set', syncKey, syncDate);
    return;
  }

  // syncDateが変わった → Scriptが動いた → 新規注文を検出
  var prevOrders = JSON.parse(prevRaw);
  var prevSet    = {};
  prevOrders.forEach(function(o){ prevSet[orderFingerprint(o)] = true; });

  var newFound = [];
  freshOrders.forEach(function(o, i){
    if (!prevSet[orderFingerprint(o)]) { newFound.push(i); newOrderKeys[i] = true; }
  });

  if (newFound.length > 0) {
    var batchNum = Math.min(parseInt(store('get','batchnum_'+todayKey())||'0') + 1, 3);
    store('set','batchnum_'+todayKey(), batchNum);
    var batches = JSON.parse(store('get','batches_'+todayKey())||'{}');
    var hm = pad(new Date().getHours())+':'+pad(new Date().getMinutes());
    newFound.forEach(function(i){
      batches[orderFingerprint(freshOrders[i])] = { b: batchNum, t: hm };
    });
    store('set','batches_'+todayKey(), JSON.stringify(batches));
  }

  if (syncDate) store('set', syncKey, syncDate);
}

function getAdminDeleted() {
  return JSON.parse(store('get','admin_del_'+todayKey()) || '{}');
}
function setAdminDeleted(fp, val) {
  var d = getAdminDeleted();
  if (val) d[fp] = true; else delete d[fp];
  store('set','admin_del_'+todayKey(), JSON.stringify(d));
}

function getBatchInfo(o) {
  var batches = JSON.parse(store('get','batches_'+todayKey())||'{}');
  return batches[orderFingerprint(o)] || null;
}

function getNewInfo() {
  var count = Object.keys(newOrderKeys).length;
  var hm = count > 0 ? pad(new Date().getHours())+':'+pad(new Date().getMinutes()) : '';
  return { count: count, time: hm };
}

function saveSnapshot(orders) {
  store('set', todayKey(), JSON.stringify(orders));
}

// 営業日：20:00以降は翌日の営業日扱い
function businessDate() {
  var now = new Date();
  if (now.getHours() >= 20) now.setDate(now.getDate() + 1);
  return now;
}

function todayKey() {
  var d = businessDate();
  return 'snap_' + d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate());
}

function getDateStr() {
  var d = businessDate();
  return d.getFullYear() + '/' + pad(d.getMonth()+1) + '/' + pad(d.getDate());
}

function renderNewBanner(elId, isAdmin) {
  var info = getNewInfo();
  var el   = document.getElementById(elId);
  if (info.count > 0) {
    el.style.display = 'block';
    el.innerHTML =
      '<div class="new-banner">' +
      '  <div class="nb-icon">🆕</div>' +
      '  <div class="nb-text">' +
      '    <strong>' + info.count + '件の新しい注文が追加されました</strong>' +

function dismissBanner(elId) {
  document.getElementById(elId).style.display = 'none';
  newOrderKeys = {}; // xóa in-memory, không hiện lại cho đến khi có đơn mới thật
}

function getShortName(custCode) {
  return NAME_MAP[Number(custCode)] || null;
}

// 1.0 → 1 / 1.50 → 1.5 / 30.00 → 30
function fmtQty(val) {
  var n = parseFloat(val);
  if (isNaN(n)) return val;
  return parseFloat(n.toFixed(2)).toString();
}

// キーワードにマッチするVARIANT_GROUPSのキーワードを返す（なければnull）
function getVariantKeyword(itemName) {
  for (var i = 0; i < VARIANT_GROUPS.length; i++) {
    if (itemName.indexOf(VARIANT_GROUPS[i]) !== -1) return VARIANT_GROUPS[i];
  }
  return null;
}

function renderOrdersList() {
  var el = document.getElementById('orders-list');
  if (todayOrders.length === 0) {
    el.innerHTML = '<div class="empty"><div class="eicon">📭</div><p>本日の注文はありません</p></div>';
    return;
  }

  // ── Admin comment banner for this group ──
  var cmt = groupComments[loginCode];
  var cmtHtml = '';
  if (cmt && cmt.text) {
    var readKey = 'cmt_read_'+todayKey()+'_'+loginCode;
    var isRead  = store('get', readKey) === '1';
    var expandKey = 'cmt_open_'+todayKey()+'_'+loginCode;
    // 未読はデフォルトで開く、確認済みはデフォルトで閉じる
    var isOpen  = isRead ? store('get', expandKey) === '1' : store('get', expandKey) !== '0';
    if (isRead) {
      cmtHtml =
        '<div class="cmt-strip read" onclick="toggleCmtBanner()">'+
        '  <span class="cmt-strip-dot"></span>'+
        '  <span class="cmt-strip-label">✓ 管理者コメント確認済み</span>'+
        '  <span class="cmt-strip-arrow'+(isOpen?' open':'')+'">▾</span>'+
        '</div>'+
        (isOpen ?
          '<div class="cmt-expanded">'+
          '<div class="cmt-expanded-text">'+esc(cmt.text)+'</div>'+
          (cmt.time?'<div style="font-size:11px;color:#aaa">'+cmt.time+' 掲載</div>':'')+
          '</div>' : '');
    } else {
      cmtHtml =
        '<div class="cmt-strip unread" onclick="toggleCmtBanner()">'+
        '  <span class="cmt-strip-dot"></span>'+
        '  <span class="cmt-strip-label">📢 管理者からのお知らせ（未読）</span>'+
        '  <span class="cmt-strip-arrow'+(isOpen?' open':'')+'">▾</span>'+
        '</div>'+
        (isOpen ?
          '<div class="cmt-expanded">'+
          '<div class="cmt-expanded-text">'+esc(cmt.text)+'</div>'+
          (cmt.time?'<div style="font-size:11px;color:#aaa;margin-bottom:12px">'+cmt.time+' 掲載</div>':'<div style="margin-bottom:12px"></div>')+
          '<button class="btn-cmt-read" onclick="markCmtRead(event)">✓ 確認しました</button>'+
          '</div>' : '');
    }
  }

  // ── Comment panel ──
  var commentMap = {};
  todayOrders.forEach(function(o) {
    if (o.comment && !commentMap[o.custCode]) {
      commentMap[o.custCode] = { name: getShortName(o.custCode) || o.custName, text: o.comment };
    }
  });
  var commentEntries = Object.keys(commentMap);
  var cpHtml = '';
  if (commentEntries.length > 0) {
    var cpRows = commentEntries.map(function(code) {
      var c = commentMap[code];
      return '<div class="cp-row"><div class="cp-store">' + esc(code + ' ' + c.name) + '</div><div class="cp-text">' + esc(c.text) + '</div></div>';
    }).join('');
    cpHtml =
      '<div class="comment-panel">' +
      '  <div class="comment-panel-header" onclick="toggleCommentPanel(this)">' +
      '    <span class="cp-icon">📌</span>' +
      '    <span class="cp-title">コメントあり（' + commentEntries.length + '件）</span>' +
      '    <span class="cp-arrow">▾</span>' +
      '  </div>' +
      '  <div class="comment-panel-body">' + cpRows + '</div>' +
      '</div>';
  }

  // ── Group orders by product / variant keyword ──
  var groups   = {};   // groupKey → { label, entries[] }
  var groupOrder = [];

  todayOrders.forEach(function(o, i) {
    var kw       = getVariantKeyword(o.itemName);
    var groupKey = kw || o.itemName;
    if (!groups[groupKey]) {
      groups[groupKey] = { label: kw || o.itemName, isVariant: !!kw, entries: [] };
      groupOrder.push(groupKey);
    }
    groups[groupKey].entries.push({ o: o, i: i });
  });

  // Sort entries inside each group by custCode ascending
  groupOrder.forEach(function(key) {
    groups[key].entries.sort(function(a, b) {
      return parseFloat(a.o.custCode) - parseFloat(b.o.custCode);
    });
  });

  var cardsHtml = groupOrder.map(function(key) {
    return buildProductCard(groups[key]);
  }).join('');

  el.innerHTML = cmtHtml + cpHtml + cardsHtml;
}

function buildProductCard(group) {
  var isVariant = group.isVariant;

  // グループ109（食）は合計のみ表示
  var isTotalOnly = group.entries.length > 0 &&
    TOTAL_ONLY_GROUPS.indexOf(Number(group.entries[0].o.itemCode)) !== -1;

  var rowsHtml;
  if (isTotalOnly) {
    // 数量を合計して1行だけ表示
    var totalQty = 0, unit = '';
    group.entries.forEach(function(e){
      var q = parseFloat(e.o.qty) || 0;
      totalQty += q;
      if (!unit) unit = e.o.unit;
    });
    rowsHtml = '<div class="store-row" style="justify-content:center;padding:16px">'+
      '<div style="text-align:center">'+
      '  <div class="store-qty" style="font-size:28px">'+fmtQty(totalQty)+'</div>'+
      '  <div class="store-unit">'+esc(unit)+'</div>'+
      '</div>'+
      '</div>';
  } else {
    rowsHtml = group.entries.map(function(entry) {
      var o         = entry.o;
      var fp        = orderFingerprint(o);
      var cancelled = !!getGasDeleted()[fp];
      var bInfo     = getBatchInfo(o);
      var batchCls  = cancelled ? ' is-cancelled' : (bInfo ? ' is-new-' + bInfo.b : '');
      var timeBadge = (!cancelled && bInfo) ? '<span class="new-time">' + bInfo.t + '</span>' : '';
      var cancelMsg = cancelled
        ? '<div class="cancelled-msg">大変申し訳ございません。こちらの注文はキャンセルとなりました。</div>' : '';
      var adj       = stockAdjusted[fp];
      var adjBadge  = (!cancelled && adj)
        ? '<div class="stock-adj">在庫調整：'+fmtQty(adj.from)+' → '+fmtQty(adj.to)+'</div>' : '';
      var shortName = getShortName(o.custCode);
      return [
        '<div class="store-row' + batchCls + '">',
        '  <div class="store-code-block">',
        '    <div class="store-code">' + esc(o.custCode) + '</div>',
        '    <div class="store-name-short">' + esc(shortName || o.custName) + '</div>',
        timeBadge, cancelMsg, adjBadge,
        '  </div>',
        '  <div class="store-mid">' + (isVariant ? esc(o.itemName) : '') + '</div>',
        '  <div class="store-qty-block">',
        '    <div class="store-qty' + (cancelled ? ' cancelled' : '') + '">' + fmtQty(o.qty) + '</div>',
        '    <div class="store-unit">' + esc(o.unit) + '</div>',
        '  </div>',
        '</div>'
      ].join('');
    }).join('');
  }

  return [
    '<div class="product-card">',
    '  <div class="product-card-header">',
    '    <div class="product-name">' + esc(group.label) + '</div>',
    '  </div>',
    rowsHtml,
    '</div>'
  ].join('');
}

function toggleCommentPanel(header) {
  var body  = header.nextElementSibling;
  var arrow = header.querySelector('.cp-arrow');
  var open  = body.classList.toggle('open');
  arrow.classList.toggle('open', open);
}

function toggleCmtBanner() {
  var expandKey = 'cmt_open_'+todayKey()+'_'+loginCode;
  var isOpen = store('get', expandKey) === '1';
  store('set', expandKey, isOpen ? '0' : '1');
  renderOrdersList();
}

function markCmtRead(e) {
  e.stopPropagation();
  store('set', 'cmt_read_'+todayKey()+'_'+loginCode, '1');
  store('set', 'cmt_open_'+todayKey()+'_'+loginCode, '0');
  renderOrdersList();
  showToast('確認済みにしました ✓','success');
}

function switchTab(tab) {
  document.getElementById('tab-today').classList.toggle('active',   tab==='today');
  document.getElementById('tab-shiire').classList.toggle('active',  tab==='shiire');
  document.getElementById('panel-today').style.display   = tab==='today'   ? 'block':'none';
  document.getElementById('panel-shiire').style.display  = tab==='shiire'  ? 'block':'none';
  if (tab==='shiire' && !shiireLoaded) initShiireTab();
}

function renderAdmin(syncDate) {
  document.getElementById('header-title').textContent = '管理者画面';
  document.getElementById('header-sub').textContent   = getDateStr() + (syncDate ? '　同期: ' + syncDate : '');
  document.getElementById('partner-view').style.display = 'none';
  document.getElementById('admin-view').style.display   = 'flex';

  adminEdits = JSON.parse(store('get','admin_edits_'+todayKey()) || '{}');

  renderNewBanner('admin-new-banner', true);

  // Build category tabs
  var groupSet = {};
  todayOrders.forEach(function(o){ if(o.itemCode) groupSet[String(o.itemCode)]=true; });
  var groups = Object.keys(groupSet).map(Number).filter(Boolean).sort(function(a,b){return a-b;});

  var tabBar = document.getElementById('admin-tab-bar');
  tabBar.innerHTML = groups.map(function(c){
    var lbl = CODE_LABELS[c]||'コード'+c;
    var isFirst = (c === groups[0]);
    return '<button class="tab-item'+(isFirst?' active':'')+'" data-code="'+c+'" onclick="selectAdminGroup(\''+c+'\')">'+lbl+'</button>';
  }).join('');

  currentGroup = groups[0];
  renderAdminCmtBanner();
  renderAdminList();
}

function renderAdminCmtBanner() {
  var cmtEl = document.getElementById('admin-comment-area');
  if (!cmtEl || !currentGroup) {
    if (cmtEl) cmtEl.innerHTML = '';
    return;
  }
  var cmt     = groupComments[String(currentGroup)] || {};
  var expandKey = 'acmt_open_'+todayKey()+'_'+currentGroup;
  var isOpen  = store('get', expandKey) !== '0'; // デフォルトで開く

  cmtEl.innerHTML =
    '<div class="cmt-strip unread" onclick="toggleAdminCmtBanner()" style="margin-bottom:12px">'+
    '  <span class="cmt-strip-dot" style="background:#991b1b;animation:none"></span>'+
    '  <span class="cmt-strip-label">📢 管理者コメント'+(cmt.text?'':'（未設定）')+'</span>'+
    '  <span class="cmt-strip-arrow'+(isOpen?' open':'')+'">▾</span>'+
    '</div>'+
    (isOpen ?
      '<div class="cmt-expanded" style="background:#fff1f1;border-color:#fca5a5;margin-bottom:12px">'+
      '<div class="cmt-expanded-text">'+(cmt.text ? esc(cmt.text) : '<span style="opacity:.4">コメントなし — 下のボタンから追加できます</span>')+'</div>'+
      (cmt.time?'<div style="font-size:11px;color:#aaa;margin-bottom:12px">'+cmt.time+' 掲載</div>':'<div style="margin-bottom:12px"></div>')+
      '<button class="btn-cmt-read" style="background:var(--navy)" onclick="openCmtModal();event.stopPropagation()">✏️ '+(cmt.text?'編集する':'コメントを追加')+'</button>'+
      '</div>' : '');
}

function toggleAdminCmtBanner() {
  var expandKey = 'acmt_open_'+todayKey()+'_'+currentGroup;
  store('set', expandKey, store('get',expandKey)==='1'?'0':'1');
  renderAdminCmtBanner();
}

function selectAdminGroup(code) {
  currentGroup = code;
  document.querySelectorAll('#admin-tab-bar .tab-item').forEach(function(b){
    b.classList.toggle('active', String(b.dataset.code)===String(code));
  });
  renderAdminCmtBanner();
  renderAdminList();
}

function renderAdminList() {
  adminEdits = JSON.parse(store('get','admin_edits_'+todayKey()) || '{}');
  var el   = document.getElementById('admin-list');

  var allRows = todayOrders.map(function(o,i){
    var key  = orderKey(i,o);
    var edit = adminEdits[key] || {};
    return { key:key, i:i, o:o,
      qty:     edit.qty     !== undefined ? edit.qty     : o.qty,
      unit:    edit.unit    !== undefined ? edit.unit    : o.unit,
      comment: edit.comment !== undefined ? edit.comment : (o.comment||''),
      deleted: !!edit.deleted
    };
  });

  var rows = currentGroup==='all' ? allRows
    : allRows.filter(function(r){ return String(r.o.itemCode)===String(currentGroup); });

  if (rows.length===0) {
    el.innerHTML='<div class="empty"><div class="eicon">📭</div><p>データなし</p></div>';
    return;
  }

  // ── Yellow comment panel (store comments) ── same as partner view
  var commentMap = {};
  rows.forEach(function(r){
    if(r.o.comment && !commentMap[r.o.custCode]){
      commentMap[r.o.custCode] = { name: getShortName(r.o.custCode)||r.o.custName, text: r.o.comment };
    }
  });
  var commentEntries = Object.keys(commentMap);
  var cpHtml = '';
  if(commentEntries.length > 0){
    var cpRows = commentEntries.map(function(code){
      var c = commentMap[code];
      return '<div class="cp-row"><div class="cp-store">'+esc(code+' '+c.name)+'</div><div class="cp-text">'+esc(c.text)+'</div></div>';
    }).join('');
    cpHtml = '<div class="comment-panel">'+
      '<div class="comment-panel-header" onclick="toggleCommentPanel(this)">'+
      '<span class="cp-icon">📌</span>'+
      '<span class="cp-title">コメントあり（'+commentEntries.length+'件）</span>'+
      '<span class="cp-arrow">▾</span>'+
      '</div>'+
      '<div class="comment-panel-body">'+cpRows+'</div>'+
      '</div>';
  }

  var gmap={}, gorder=[];
  rows.forEach(function(r){
    var kw=getVariantKeyword(r.o.itemName), gk=kw||r.o.itemName;
    if(!gmap[gk]){gmap[gk]={label:kw||r.o.itemName,rows:[]};gorder.push(gk);}
    gmap[gk].rows.push(r);
  });
  gorder.forEach(function(k){
    gmap[k].rows.sort(function(a,b){return parseFloat(a.o.custCode)-parseFloat(b.o.custCode);});
  });

  el.innerHTML = cpHtml + gorder.map(function(k){
    var g   = gmap[k];
    var cid = 'afc_'+skStr(k);
    var isTotalOnly = g.rows.length > 0 &&
      TOTAL_ONLY_GROUPS.indexOf(Number(g.rows[0].o.itemCode)) !== -1;
    var active  = g.rows.filter(function(r){return !r.deleted;});
    var deleted = g.rows.filter(function(r){return r.deleted;});

    var storeRows;
    if (isTotalOnly) {
      var totalQty = 0, unit = '';
      active.forEach(function(r){ totalQty += parseFloat(r.qty)||0; if(!unit) unit=r.unit; });
      storeRows = '<div class="store-row" style="justify-content:center;padding:16px">'+
        '<div style="text-align:center">'+
        '  <div class="store-qty" style="font-size:28px">'+fmtQty(totalQty)+'</div>'+
        '  <div class="store-unit">'+esc(unit)+'</div>'+
        '</div></div>';
    } else {
      storeRows = active.map(function(r){return buildAdminStoreRow(r);}).join('');
    }
    var delRows = deleted.map(function(r){return buildAdminDeletedRow(r);}).join('');
    return '<div class="s-fish-card" id="'+cid+'">'+
      '<div class="s-fish-header" onclick="toggleFC(\''+cid+'\')">'+
      '<div><div class="s-fish-name">'+esc(g.label)+'</div>'+
      '<div class="s-fish-summary">'+active.length+'店舗'+(deleted.length>0?' · '+deleted.length+'件削除済':'')+
      (currentGroup==='all'?' · '+(CODE_LABELS[Number(g.rows[0].o.itemCode)]||''):'')+'</div></div>'+
      '<span class="s-fish-arrow" id="arr_'+cid+'">▾</span></div>'+
      '<div class="s-fish-body" id="body_'+cid+'">'+ 
      '<div class="s-store-list">'+storeRows+delRows+'</div></div></div>';
  }).join('');
}

function openCmtModal() {
  var cmt = groupComments[String(currentGroup)] || {};
  document.getElementById('cmt-modal-label').textContent =
    (CODE_LABELS[Number(currentGroup)] || 'グループ'+currentGroup) + ' へのコメント';
  document.getElementById('cmt-modal-text').value = cmt.text || '';
  document.getElementById('cmt-modal').classList.add('show');
  setTimeout(function(){ document.getElementById('cmt-modal-text').focus(); }, 150);
}
function closeCmtModal() { document.getElementById('cmt-modal').classList.remove('show'); }
function saveCmtModal() {
  var text    = document.getElementById('cmt-modal-text').value.trim();
  var dateStr = todayKey().replace('snap_','');
  fetch(gasUrl + '?action=setGroupComment&code=' + encodeURIComponent(currentGroup)
    + '&text=' + encodeURIComponent(text) + '&date=' + encodeURIComponent(dateStr))
  .then(function(){
    if (text) {
      groupComments[String(currentGroup)] = { text: text, time: pad(new Date().getHours())+':'+pad(new Date().getMinutes()) };
    } else {
      delete groupComments[String(currentGroup)];
    }
    closeCmtModal();
    renderAdminList();
    showToast(text ? 'コメントを保存しました':'コメントを削除しました', 'success');
  }).catch(function(){ showToast('保存に失敗しました','error'); });
}

function buildAdminStoreRow(r) {
  var key  = r.key;
  var sname= getShortName(r.o.custCode)||r.o.custName;
  var bInfo= getBatchInfo(r.o);
  var bCls = bInfo ? ' is-new-'+bInfo.b : '';
  var adj  = stockAdjusted[orderFingerprint(r.o)];
  var adjBadge = adj ? '<div style="font-size:11px;color:#dc2626;font-weight:700;margin-top:2px">在庫調整：'+fmtQty(adj.from)+' → '+fmtQty(adj.to)+'</div>' : '';
  return '<div class="s-store-row'+bCls+'" id="arow_'+key+'">'+
    '<div class="s-store-header" onclick="toggleASR(\''+key+'\')">'+
    '<div>'+
    '<div class="s-store-name-text">'+esc(r.o.custCode)+' '+esc(sname)+'</div>'+
    '<div style="font-size:12px;color:#64748b;margin-top:2px">'+fmtQty(r.qty)+' '+esc(r.unit)+'</div>'+
    adjBadge+
    (r.comment?'<div style="font-size:11px;color:#f59e0b;margin-top:2px">📌 '+esc(r.comment)+'</div>':'')+
    (bInfo?'<div class="new-time">'+bInfo.t+'</div>':'')+
    '</div>'+
    '<span style="font-size:20px;color:#cbd5e1">›</span>'+
    '</div>'+
    '<div class="s-input-area" id="aarea_'+key+'">'+
    '<div class="s-input-grid" style="grid-template-columns:1fr 1fr;margin-bottom:10px">'+
    '<div class="s-field"><label>数量</label><input type="number" id="aqty_'+key+'" value="'+esc(fmtQty(r.qty))+'" inputmode="decimal"></div>'+
    '<div class="s-field"><label>単位</label><input type="text" id="aunit_'+key+'" value="'+esc(r.unit)+'"></div>'+
    '</div>'+
    '<div class="s-field" style="margin-bottom:12px"><label>コメント</label>'+

function saveAdminRow(key){

  var unit=document.getElementById('aunit_'+key).value;

  adminEdits[key].qty=qty; adminEdits[key].unit=unit; adminEdits[key].comment=cmt;
  store('set','admin_edits_'+todayKey(), JSON.stringify(adminEdits));

function deleteAdminRow(key){
  adminEdits=JSON.parse(store('get','admin_edits_'+todayKey())||'{}');
  if(!adminEdits[key]) adminEdits[key]={};
  adminEdits[key].deleted=true;
  store('set','admin_edits_'+todayKey(), JSON.stringify(adminEdits));
  for(var j=0;j<todayOrders.length;j++){
    if(orderKey(j,todayOrders[j])===key){
      var fp=orderFingerprint(todayOrders[j]);
      var ds=todayKey().replace('snap_','');
      fetch(gasUrl+'?action=markDeleted&fp='+encodeURIComponent(fp)+'&date='+encodeURIComponent(ds)).catch(function(){});
      var d=getGasDeleted(); d[fp]=true;
      store('set','gas_deleted_'+todayKey(), JSON.stringify(d));
      break;
    }
  }
  showToast('削除しました');
  renderAdminList();
}

function restoreAdminRow(key){
  adminEdits=JSON.parse(store('get','admin_edits_'+todayKey())||'{}');
  if(adminEdits[key]) adminEdits[key].deleted=false;
  store('set','admin_edits_'+todayKey(), JSON.stringify(adminEdits));
  // Báo server bỏ đơn này khỏi danh sách đã xoá
  for(var j=0;j<todayOrders.length;j++){
    if(orderKey(j,todayOrders[j])===key){
      var fp=orderFingerprint(todayOrders[j]);
      var ds=todayKey().replace('snap_','');
      fetch(gasUrl+'?action=unmarkDeleted&fp='+encodeURIComponent(fp)+'&date='+encodeURIComponent(ds)).catch(function(){});
      var d=getGasDeleted(); delete d[fp];
      store('set','gas_deleted_'+todayKey(), JSON.stringify(d));
      break;
    }
  }
  showToast('復元しました','success');
  renderAdminList();
}

function skStr(s){var r='';for(var i=0;i<s.length;i++){var c=s.charCodeAt(i);if((c>=65&&c<=90)||(c>=97&&c<=122)||(c>=48&&c<=57))r+=s[i];else r+='x'+c;}return r;}
function sKey(fn,idx){return skStr(fn)+'_'+idx;}

var TOTAL_ONLY_GROUPS = [109]; // このグループは合計のみ表示

var SHIIRE_PRIORITY=['アナゴ','カツオ','タコ'];
function getPriority(n){for(var i=0;i<SHIIRE_PRIORITY.length;i++){if(n.indexOf(SHIIRE_PRIORITY[i])!==-1)return i;}return SHIIRE_PRIORITY.length;}

async function loadShiireData(){
  var panelId = isAdmin ? 'admin-shiire-panel' : 'panel-shiire';
  var panel = document.getElementById(panelId);
  if(panel) panel.innerHTML='<div style="text-align:center;padding:60px 20px;color:var(--gray)"><div style="font-size:32px;margin-bottom:12px">⏳</div><p style="font-size:13px">読み込み中...</p></div>';
  showLoading('仕入データを読み込み中...');
  try{
    var url=SHIIRE_GAS_URL+'?action=readAll&sheetId='+encodeURIComponent(SHIIRE_SHEET_ID)+'&sheetName='+encodeURIComponent(shiireSheet);
    var res=await fetch(url);
    var json=await res.json();
    if(json.error){
      if(panel) panel.innerHTML='<div style="text-align:center;padding:60px 20px;color:var(--red)"><div style="font-size:32px;margin-bottom:12px">⚠️</div><p style="font-size:13px">'+esc(json.error)+'</p><button onclick="reloadShiire()" style="margin-top:12px;padding:10px 20px;background:var(--navy);color:white;border:none;border-radius:10px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer">🔄 再試行</button></div>';
      hideLoading();return;
    }
    shiireData={};
    (json.rows||[]).forEach(function(r){if(!shiireData[r.name])shiireData[r.name]=[];shiireData[r.name].push(r);});
    // 送信待ちの入力を新しいデータに上書き反映（番号が消えないように）
    applyQueueOverlay();
    shiireLoaded=true;
    renderShiireList();
  }catch(e){
    if(panel) panel.innerHTML='<div style="text-align:center;padding:60px 20px;color:var(--red)"><div style="font-size:32px;margin-bottom:12px">⚠️</div><p style="font-size:13px">通信エラー: '+esc(e.message)+'</p><button onclick="reloadShiire()" style="margin-top:12px;padding:10px 20px;background:var(--navy);color:white;border:none;border-radius:10px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer">🔄 再試行</button></div>';
    showToast('通信エラー: '+e.message,'error');
  }
  hideLoading();
}

var adminCurrentTab = 'shiire';

var shiireCurrentPrefix = null; // null = 全て

// ── 画面チラつき防止 ─────────────────────────────────────────
// 入力中（数量/単価のinputにフォーカスがある）は再描画を行わない。
// 再描画はDOMを丸ごと作り直す（innerHTML）ためフォーカス・入力中の
// 文字が失われ、画面が一瞬ちらつく。入力中に再描画要求が来た場合は
// pendingに記録し、フォーカスが外れた瞬間にまとめて再描画する。
var shiireRenderPending = false;

function isEditingShiire(){
  var a = document.activeElement;
  if(!a || a.tagName !== 'INPUT' || !a.id) return false;
  return a.id.charAt(0)==='f' && a.id.charAt(1)==='_'
      || a.id.charAt(0)==='h' && a.id.charAt(1)==='_'
      || a.id.charAt(0)==='i' && a.id.charAt(1)==='_';
}

// 入力欄からフォーカスが外れたら、保留していた再描画を実行
document.addEventListener('focusout', function(e){
  var t = e.target;
  if(!t || t.tagName !== 'INPUT' || !t.id) return;
  var isShiireInput = (t.id.charAt(1)==='_') &&
    (t.id.charAt(0)==='f' || t.id.charAt(0)==='h' || t.id.charAt(0)==='i');
  if(!isShiireInput) return;
  // フォーカスが別の入力欄へ移った場合は再描画しない（連続入力を妨げない）
  setTimeout(function(){
    if(isEditingShiire()) return;          // まだ別のinputを編集中
    if(shiireRenderPending){
      shiireRenderPending = false;
      renderShiireList();
    }
  }, 0);
});

function renderShiireList(){
  // 入力中はDOMを作り直さない（チラつき・フォーカス喪失を防止）。
  // 後でフォーカスが外れたタイミングで再描画する。
  if(isEditingShiire()){ shiireRenderPending = true; return; }

  var panelId = isAdmin ? 'admin-shiire-panel' : 'panel-shiire';
  var el = document.getElementById(panelId);
  if(!el) return;

  // Build prefix list from data
  var allNames = Object.keys(shiireData);
  var prefixSet = {};
  allNames.forEach(function(n){
    var pfx = n.substring(0,2); // e.g. '丸）'
    if(pfx.indexOf('）')!==-1) prefixSet[pfx]=true;
  });
  var prefixes = Object.keys(CODE_TO_PREFIX).map(function(c){return CODE_TO_PREFIX[c];})
    .filter(function(p){return prefixSet[p];});

  // Tab bar (admin only or partner with multiple groups)
  var showTabs = isAdmin && prefixes.length > 1;
  var tabBarHtml = '';
  if(showTabs){
    if(!shiireCurrentPrefix) shiireCurrentPrefix = prefixes[0];
    tabBarHtml = '<div style="display:flex;overflow-x:auto;gap:4px;padding:0 0 12px;scrollbar-width:none">'+
      prefixes.map(function(p){
        var lbl = Object.keys(CODE_TO_PREFIX).reduce(function(acc,c){
          return CODE_TO_PREFIX[c]===p ? CODE_LABELS[Number(c)]||p : acc;
        },'');
        var active = shiireCurrentPrefix===p;
        return '<button onclick="selectShiirePrefix(\''+p+'\')" style="flex-shrink:0;padding:7px 16px;border-radius:20px;border:1.5px solid '+(active?'var(--navy)':'var(--border)')+';background:'+(active?'var(--navy)':'white')+';color:'+(active?'white':'var(--gray)')+';font-size:13px;font-weight:700;font-family:inherit;cursor:pointer">'+esc(lbl)+'</button>';
      }).join('')+
      '</div>';
  } else {
    shiireCurrentPrefix = isAdmin ? null : (CODE_TO_PREFIX[Number(loginCode)]||null);
  }

  var prefix = shiireCurrentPrefix;
  var hdr='<div style="background:white;border-radius:11px;padding:11px 14px;display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;border:1px solid var(--border);box-shadow:var(--shadow-sm)">'+
    '<div><div style="font-size:13px;font-weight:700;color:var(--navy)">'+esc(shiireSheet)+'</div>'+
    '<div style="font-size:11px;color:var(--gray)">本日の仕入入力</div></div>'+
    '<button onclick="reloadShiire()" style="font-size:12px;color:var(--navy);background:#eef3fb;border:1px solid #c5d8f0;border-radius:8px;padding:7px 12px;font-family:inherit;font-weight:700;cursor:pointer">🔄 再読込</button>'+
  '</div>'+
  '<div id="shiire-queue-bar" style="display:none;position:fixed;left:50%;bottom:20px;transform:translateX(-50%);max-width:92%;justify-content:center;align-items:center;gap:8px;background:#fffbeb;border:1px solid var(--amber-border);border-radius:24px;padding:9px 18px;box-shadow:0 6px 24px rgba(15,39,68,0.25);z-index:900;white-space:nowrap"></div>';
  var names=Object.keys(shiireData).filter(function(n){return !prefix||n.startsWith(prefix);}).sort(function(a,b){
    var kwa=null,kwb=null;
    SHIIRE_GROUPED.forEach(function(kw){if(a.indexOf(kw)!==-1&&!kwa)kwa=kw;if(b.indexOf(kw)!==-1&&!kwb)kwb=kw;});
    var pa=getPriority(kwa||a),pb=getPriority(kwb||b);
    if(pa!==pb)return pa-pb;
    return (kwa||a).localeCompare(kwb||b,'ja');
  });
  if(names.length===0){
    var debugMsg = prefix
      ? 'プレフィックス「'+esc(prefix)+'」のデータが見つかりません<br><small style="color:#aaa">シートに「'+esc(prefix)+'」で始まる行があるか確認してください</small>'
      : 'データがありません';
    el.innerHTML=hdr+tabBarHtml+'<div class="empty"><div class="eicon">📋</div><p>'+debugMsg+'</p></div>';
    return;
  }
  var rendered={},cards=[];
  names.forEach(function(fn){
    var gkw=null;
    SHIIRE_GROUPED.forEach(function(kw){if(fn.indexOf(kw)!==-1&&!gkw)gkw=kw;});
    if(gkw){
      var gk=(prefix||'all')+'_'+gkw;
      if(!rendered[gk]){rendered[gk]=true;var vs=names.filter(function(n){return n.indexOf(gkw)!==-1;});cards.push(buildGrpCard(gkw,vs));}
    }else{
      if(!rendered[fn]){rendered[fn]=true;cards.push(buildFishCard(fn));}
    }
  });
  el.innerHTML=hdr+tabBarHtml+cards.join('');
  updateQueueBadge();
  flushShiireQueue();
  setTimeout(function(){
    el.querySelectorAll('[data-autodefault="1"]').forEach(function(inp){
      var fn2=inp.getAttribute('data-fn');
      var idx2=parseInt(inp.getAttribute('data-idx'));
      var key2=inp.id.replace('f_','');
      schSave(fn2,idx2,key2);
    });
  },100);
}

function buildFishCard(fn){
  var stores=shiireData[fn]||[];
  var filled=stores.filter(function(s){return s.qty!==''&&s.qty!==null;}).length;
  var cid='fc_'+skStr(fn);
  var rows=stores.map(function(s,i){return buildStoreRow(fn,i,s,false);}).join('');
  return '<div class="s-fish-card'+(filled>0?' has-filled':'')+'" id="'+cid+'">'+
    '<div class="s-fish-header" onclick="toggleFC(\''+cid+'\')">'+
    '<div><div class="s-fish-name">'+esc(fn)+'</div><div class="s-fish-summary">'+stores.length+'店舗 · '+filled+'件入力済</div></div>'+
    '<span class="s-fish-arrow" id="arr_'+cid+'">▾</span></div>'+
    '<div class="s-fish-body" id="body_'+cid+'"><div class="s-store-list">'+rows+'</div></div></div>';
}

function buildGrpCard(kw,variants){
  var all=[];
  variants.forEach(function(vn){(shiireData[vn]||[]).forEach(function(s,i){all.push({s:s,fn:vn,idx:i});});});
  all.sort(function(a,b){return Number(a.s.code)-Number(b.s.code);});
  var filled=all.filter(function(si){return si.s.qty!==''&&si.s.qty!==null;}).length;
  var cid='fc_grp_'+skStr(kw);
  var rows=all.map(function(si){return buildStoreRow(si.fn,si.idx,si.s,true);}).join('');
  return '<div class="s-fish-card'+(filled>0?' has-filled':'')+'" id="'+cid+'">'+
    '<div class="s-fish-header" onclick="toggleFC(\''+cid+'\')">'+
    '<div><div class="s-fish-name">'+esc(kw)+' <span style="font-size:12px;color:#94a3b8;font-weight:400">('+variants.length+'種)</span></div>'+
    '<div class="s-fish-summary">'+all.length+'店舗 · '+filled+'件入力済</div></div>'+
    '<span class="s-fish-arrow" id="arr_'+cid+'">▾</span></div>'+
    '<div class="s-fish-body" id="body_'+cid+'"><div class="s-store-list">'+rows+'</div></div></div>';
}

function buildStoreRow(fn,idx,s,showVariant){
  var key=sKey(fn,idx);
  var filled=s.qty!==''&&s.qty!==null&&s.qty!==undefined;
  var sname=NAME_MAP[Number(s.code)]||s.store;
  var vtag=showVariant?'<span style="font-size:11px;color:#94a3b8;margin-left:4px">'+esc(s.name)+'</span>':'';
  return '<div class="s-store-row'+(filled?' filled':'')+'" id="row_'+key+'">'+
    '<div class="s-store-header" onclick="toggleSR(\''+key+'\')">'+
    '<div><div class="s-store-name-text">'+esc(s.code)+' '+esc(sname)+vtag+'</div>'+
    (s.unit?'<div style="font-size:11px;color:#94a3b8">'+esc(s.unit)+'</div>':'')+
    '</div><span id="badge_'+key+'" class="s-store-badge '+(filled?'badge-filled':'badge-empty')+'">'+(filled?'✓ 入力済':'未入力')+'</span></div>'+
    '<div class="s-input-area open" id="area_'+key+'">'+
    '<div class="s-input-grid" style="grid-template-columns:1fr 1fr 1fr">'+

    (function(){var isDefault=(s.qty===''||s.qty===null||s.qty===undefined)&&fn.startsWith(CODE_TO_PREFIX[100]);var val=s.qty!==''&&s.qty!=null?s.qty:(isDefault?'5':'');return '<input type="number" id="f_'+key+'" value="'+esc(val)+'" inputmode="decimal"'+(isDefault?' data-autodefault="1" data-fn="'+esc(fn)+'" data-idx="'+idx+'"':'')+' oninput="schDirty(\''+key+'\')" onchange="schSave(\''+fn+'\','+idx+',\''+key+'\')">';})()+'</div>'+
    '<div class="s-field"><label>単価 (H列)</label>'+
    '<input type="number" id="h_'+key+'" value="'+esc(s.price||'')+'" inputmode="decimal" placeholder="同じ価格はここへ" oninput="schDirty(\''+key+'\')" onchange="schSave(\''+fn+'\','+idx+',\''+key+'\')">'+
    '<div style="font-size:10px;color:#aaa;margin-top:3px">全商品同価格の場合</div></div>'+
    '<div class="s-field"><label>仕入単価 (I列)</label>'+
    '<input type="number" id="i_'+key+'" value="'+esc(s.shiirePrice||'')+'" inputmode="decimal" placeholder="個別価格はここへ" oninput="schDirty(\''+key+'\')" onchange="schSave(\''+fn+'\','+idx+',\''+key+'\')">'+
    '<div style="font-size:10px;color:#aaa;margin-top:3px">この商品のみ異なる場合</div></div>'+

// 仕入入力 オフラインキュー（電波が弱い／圏外でも入力を保持し、
// 回線が安定したらGoogle Sheetへ書き込めるまで自動リトライ）
// ══════════════════════════════════════════════════════════════
var SHIIRE_QUEUE_KEY = 'shiire_queue_v1';

function getShiireQueue(){
  try{ return JSON.parse(store('get',SHIIRE_QUEUE_KEY)||'{}'); }catch(e){ return {}; }
}
function setShiireQueue(q){ store('set',SHIIRE_QUEUE_KEY, JSON.stringify(q)); }

// 現在のシートで送信待ちの値を shiireData に反映（再読込時に未送信の入力が消えないように）
function applyQueueOverlay(){
  var q=getShiireQueue();
  Object.keys(q).forEach(function(qk){
    var item=q[qk];
    if(!item||item.sheetName!==shiireSheet) return;
    var arr=shiireData[item.fn];
    var s=arr&&arr[item.idx];
    // 行番号で照合（fn/idxがずれても row が一致すれば反映）
    if(!s||s.row!==item.row){
      s=null;
      Object.keys(shiireData).forEach(function(nm){
        shiireData[nm].forEach(function(rr){ if(rr.row===item.row) s=rr; });
      });
    }
    if(s){
      if(item.f!=null) s.qty=item.f; 
      if(item.h!=null) s.price=item.h;
      if(item.i!=null) s.shiirePrice=item.i;
    }
  });
}

function qKeyOf(sheetName,row){ return sheetName+'|'+row; }

// 保留中の件数バッジ表示
function updateQueueBadge(){
  var q=getShiireQueue();
  var n=Object.keys(q).length;
  var el=document.getElementById('shiire-queue-bar');
  if(!el) return;
  if(n>0){
    el.style.display='flex';
    var online=navigator.onLine;
    el.innerHTML='<span style="font-size:13px;font-weight:700;color:#92400e">⏳ 送信待ち '+n+'件</span>'+
      '<span style="font-size:11px;color:#b45309">'+(online?'送信中…自動で再試行します':'📴 オフライン — 回線復帰後に自動送信')+'</span>';
  }else{
    el.style.display='none';
    el.innerHTML='';
  }
}

// 入力中（まだ送信しない）— フォーカスが外れた時に確定送信
function schDirty(key){
  clearTimeout(shiireTimers[key]);
  var m=document.getElementById('msg_'+key);
  if(m){m.textContent='✏️ 入力中…（ほかの欄を押すと保存）';m.className='s-save-msg';}
}

function schSave(fn,idx,key){
  clearTimeout(shiireTimers[key]);
  // onchange は値が確定したタイミングで発火するので即保存
  doSSave(fn,idx,key);
}

function doSSave(fn,idx,key){
  clearTimeout(shiireTimers[key]);
  var s=shiireData[fn]&&shiireData[fn][idx];
  if(!s)return;
  var fEl=document.getElementById('f_'+key);
  var hEl=document.getElementById('h_'+key);
  var iEl=document.getElementById('i_'+key);
  if(!fEl||!hEl||!iEl)return;
  var fv=fEl.value||'';
  var hv=hEl.value||'';
  var iv=iEl.value||'';

  // 1) ローカル即時反映（画面が再描画・リロードされても消えない）
  s.qty=fv; s.price=hv; s.shiirePrice=iv;

  // 2) キューに保存（永続化）— 同じ行は最新値で上書き
  var q=getShiireQueue();
  q[qKeyOf(shiireSheet,s.row)]={
    sheetName:shiireSheet, row:s.row,
    f:fv||null, h:hv||null, i:iv||null,
    fn:fn, idx:idx, key:key, ts:Date.now()
  };
  setShiireQueue(q);

  // 3) バッジ等のUI更新
  var filled=(fv!==''&&fv!=null);
  var b=document.getElementById('badge_'+key);
  if(b){b.textContent=filled?'✓ 入力済':'未入力';b.className='s-store-badge '+(filled?'badge-filled':'badge-empty');}
  var r=document.getElementById('row_'+key);if(r)r.classList.toggle('filled',filled);
  var m=document.getElementById('msg_'+key);
  if(m){m.textContent='⏳ 送信待ち';m.className='s-save-msg';}

  updateQueueBadge();

  // 4) 送信を試みる
  flushShiireQueue();
}

var shiireFlushing=false;
async function flushShiireQueue(){
  if(shiireFlushing) return;
  if(!navigator.onLine){ updateQueueBadge(); return; }
  var q=getShiireQueue();
  var keys=Object.keys(q);
  if(keys.length===0){ updateQueueBadge(); return; }
  shiireFlushing=true;
  try{
    for(var idx=0; idx<keys.length; idx++){
      var qk=keys[idx];
      var item=q[qk];
      if(!item) continue;
      // 送信中マーク（onlineバッジ用）
      try{
        // 20秒でタイムアウト（応答が返らないまま放置→二重送信を防ぐ）
        var ctrl=new AbortController();
        var to=setTimeout(function(){ctrl.abort();},20000);
        var res,json=null;
        try{
          res=await fetch(SHIIRE_GAS_URL,{
            method:'POST',
            body:JSON.stringify({action:'write',sheetId:SHIIRE_SHEET_ID,sheetName:item.sheetName,row:item.row,f:item.f,h:item.h,i:item.i}),
            headers:{'Content-Type':'text/plain'},
            signal:ctrl.signal
          });
        }finally{ clearTimeout(to); }
        // HTTPステータスを確認（GASのエラーHTMLをsuccess扱いしない）
        if(!res.ok) throw new Error('HTTP '+res.status);
        var txt=await res.text();
        try{ json=JSON.parse(txt); }catch(pe){ json=null; }
        if(json&&json.success){
          // 成功 → キューから削除
          var cur=getShiireQueue();
          delete cur[qk];
          setShiireQueue(cur);
          // 該当行が同じシートで表示中なら ✓保存 を表示
          if(item.sheetName===shiireSheet){
            var m=document.getElementById('msg_'+item.key);
            if(m){m.textContent='✓ 保存しました';m.className='s-save-msg ok';}
          }
        }else{
          // サーバ側エラー（データ不正・GASエラーページなど）→ 残して次回リトライ
          if(item.sheetName===shiireSheet){
            var m2=document.getElementById('msg_'+item.key);
            if(m2){m2.textContent='⚠️ サーバ応答が不正（再試行します）';m2.className='s-save-msg';}
          }
        }
      }catch(e){
        // 通信失敗・タイムアウト（圏外・電波弱）→ このアイテムを残して中断、後で自動リトライ
        if(item.sheetName===shiireSheet){
          var m3=document.getElementById('msg_'+item.key);
          if(m3){m3.textContent='📴 未送信（回線待ち・自動で再試行）';m3.className='s-save-msg';}
        }
        break;
      }
    }
  }finally{
    shiireFlushing=false;
    updateQueueBadge();
  }
}

// 自動リトライ：15秒ごと＋オンライン復帰時
setInterval(function(){ flushShiireQueue(); }, 15000);
window.addEventListener('online', function(){ showToast('回線が復帰しました。送信を再開します','success'); flushShiireQueue(); });
window.addEventListener('offline', function(){ updateQueueBadge(); });

// HELPERS
// ══════════════════════════════════════════════════════════════
function orderKey(i, o) {
  return todayKey() + '_' + loginCode + '_' + i + '_' + o.custCode + '_' + o.itemCode;
}

function pad(n){ return String(n).padStart(2,'0'); }

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function store(op, key, val) {
  try {
    if (op==='get') return localStorage.getItem(key);
    if (op==='set') { localStorage.setItem(key, val); return; }
    if (op==='del') { localStorage.removeItem(key); return; }
  } catch(e){ return null; }
}

function showLoading(t){ document.getElementById('loading-text').textContent=t||'Loading...'; document.getElementById('loading').classList.add('show'); }
function hideLoading(){  document.getElementById('loading').classList.remove('show'); }

function showToast(msg, type) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className   = 'show' + (type ? ' '+type : '');
  clearTimeout(t._t);
  t._t = setTimeout(function(){ t.className=''; }, 2800);
}
